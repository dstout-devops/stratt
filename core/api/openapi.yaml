# Stratt control-plane API — the source of truth (ADR-0006: spec-first;
# handlers are generated stubs that must conform). OpenAPI 3.0.3 dialect until
# oapi-codegen ships native 3.1 (tracked upstream, ADR-0006).
#
# Charter §1.6: this one surface serves UI, CLI, CI, and (later) the MCP
# server. §1.8 / ADR-0003 L2, L4: every descent rung reachable here is also a
# rendered screen — no rung is UI-only or API-only.
openapi: 3.0.3
info:
  title: Stratt API
  description: >
    Estate-automation platform API: the typed estate graph (projection,
    charter §1.2), Views, and Run orchestration. Phase-0 surface.
  version: 0.1.0
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: /api/v1
paths:
  /views:
    get:
      operationId: listViews
      summary: List Views
      responses:
        "200":
          description: Every View, ordered by name.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/View" }
  /views/{name}:
    parameters:
      - $ref: "#/components/parameters/ViewName"
    get:
      operationId: getView
      summary: Get a View (versioned, CaC-declared graph query)
      responses:
        "200":
          description: The View
          content:
            application/json:
              schema: { $ref: "#/components/schemas/View" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: declareView
      summary: Declare a View's selector (bumps the version on change)
      description: >
        Direct (api-path) declaration. Views owned by the Git-declared
        desired state (declaredBy=cac) are Git-only (charter §2.1) and this
        endpoint refuses them with 409 — edit the declarations repo instead.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ViewSelector" }
      responses:
        "200":
          description: The declared View with its current version
          content:
            application/json:
              schema: { $ref: "#/components/schemas/View" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
  /views/{name}/entities:
    parameters:
      - $ref: "#/components/parameters/ViewName"
    get:
      operationId: resolveView
      summary: Resolve the View's live Entity set
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: The live Entity set and the View version it came from
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ViewResolution" }
        "404": { $ref: "#/components/responses/NotFound" }
  /entities/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getEntity
      summary: Get one Entity with its Facets and per-attribute Provenance
      responses:
        "200":
          description: The Entity document
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EntityDocument" }
        "404": { $ref: "#/components/responses/NotFound" }
  /desired-state/plan:
    post:
      operationId: desiredStatePlan
      summary: Diff a declared desired state against the graph's Views
      description: >
        Dry run of reconciliation (charter §1.2: drift is the diff). Entries
        report the action, the selector change, and the live member count —
        blast radius before anything executes.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DesiredState" }
      responses:
        "200":
          description: The reconciliation plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /desired-state/apply:
    post:
      operationId: desiredStateApply
      summary: Reconcile the graph's Views to a declared desired state
      description: >
        Applies the plan — creates/updates/adopts declared Views (owned as
        declaredBy=cac) and prunes cac Views no longer declared. api-declared
        Views are never pruned. Per-View failures are reported on their plan
        entries; the rest still applies.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DesiredState" }
      responses:
        "200":
          description: The realized plan
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Plan" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /credential-refs:
    get:
      operationId: listCredentialRefs
      summary: List CredentialRef pointers the Principal may read
      responses:
        "200":
          description: Pointer metadata only — material has no read path.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CredentialRef" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /credential-refs/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getCredentialRef
      summary: Get one CredentialRef pointer (reader grant required)
      description: >
        Returns pointer + injection policy metadata only. There is no
        endpoint that returns secret material — no such code path exists
        (charter §2.5, ADR-0009).
      responses:
        "200":
          description: The pointer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CredentialRef" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      operationId: declareCredentialRef
      summary: Declare a CredentialRef pointer (admin grant required)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CredentialRef" }
      responses:
        "200":
          description: The declared pointer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CredentialRef" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /runs:
    get:
      operationId: listRuns
      summary: List recent Run summaries
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, format: int64, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Recent Runs, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Run" }
    post:
      operationId: startRun
      summary: Start a Run of the Phase-0 Workflow against a View
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/StartRun" }
      responses:
        "201":
          description: The created Run
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
  /runs/{id}:
    parameters:
      - $ref: "#/components/parameters/RunID"
    get:
      operationId: getRun
      summary: Get a Run summary
      responses:
        "200":
          description: The Run summary (events stream separately)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Run" }
        "404": { $ref: "#/components/responses/NotFound" }
  /runs/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/RunID"
    post:
      operationId: cancelRun
      summary: Request cancellation of a running Run
      description: >
        Signals the Run's Temporal workflow to cancel; the workflow is the
        single writer of the canceled status and deletes the Run's K8s Job(s)
        (ADR-0026). A terminal Run is a no-op. 202 = accepted (async).
      responses:
        "202": { description: Cancellation requested }
        "404": { $ref: "#/components/responses/NotFound" }
  /runs/{id}/events:
    parameters:
      - $ref: "#/components/parameters/RunID"
    get:
      operationId: tailRunEvents
      summary: Live SSE tail of the Run's full task-event stream
      description: >
        Replays from the first event and follows live (NATS-backed). Never
        truncated — the full stream of any Run is reachable (ADR-0003 L1/L2).
        Ends with a `stream-end` event once the Run's stream closes.
      responses:
        "200":
          description: Server-sent event stream; each `data:` line is a RunEvent.
          content:
            text/event-stream:
              schema: { type: string }
        "404": { $ref: "#/components/responses/NotFound" }
  /contracts:
    get:
      operationId: listContracts
      summary: List pinned Contracts
      description: >
        Every pinned Contract and Facet schema (charter §1.5, ADR-0015):
        the JSON Schema document, its sha256 pin, version, and derivation
        rung. The SchemaForm/SchemaTable rendering source (ADR-0003 L7/L8).
      responses:
        "200":
          description: Pinned Contracts, ordered by name and version.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Contract" }
  /emitters:
    get:
      operationId: listEmitters
      summary: List declared Emitters
      description: >
        Emitters are CaC-only event ingest points (ADR-0018). Declarations
        hold only token hashes — there is no secret to read here (§2.5).
      responses:
        "200":
          description: Every declared Emitter.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Emitter" }
  /sites:
    get:
      operationId: listSites
      summary: List declared Sites
      description: >
        Sites are CaC-declared remote execution loci (ADR-0032). The response
        merges the declaration with live agent status from the liveness KV
        (§1.2 — status is never persisted to the graph). Declarations hold no
        secret material (§2.5).
      responses:
        "200":
          description: Every declared Site, with live status.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Site" }
  /sites/{name}:
    get:
      operationId: getSite
      summary: Get one declared Site
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: The Site declaration with live status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Site" }
        "404":
          description: No such Site.
  /usage:
    get:
      operationId: listUsage
      summary: Per-Principal MCP usage accounting
      description: >
        Aggregated platform-MCP-server tool calls per (Principal, tool) —
        the charter §1.6 "cost/usage accounting per identity" record
        (ADR-0021). Phase-4 per-Principal cost analytics builds on it.
      parameters:
        - name: principal
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Usage aggregates, ordered by principal then tool.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/UsageEntry" }
  /intents:
    get:
      operationId: listIntents
      summary: List declared Intents (CaC-only, ADR-0023)
      responses:
        "200":
          description: Every declared Intent.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Intent" }
  /assignments:
    get:
      operationId: listAssignments
      summary: List declared Assignments (CaC-only, ADR-0023)
      responses:
        "200":
          description: Every declared Assignment.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Assignment" }
  /blueprints:
    get:
      operationId: listBlueprints
      summary: List declared Blueprint versions (CaC-only, ADR-0023)
      responses:
        "200":
          description: Every declared Blueprint version.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Blueprint" }
  /compile:
    get:
      operationId: getCompileStatus
      summary: Latest Intent-compile status — membership deltas, pauses, errors
      description: >
        The §4.3 "stratt plan renders membership deltas" surface (ADR-0023):
        per-Assignment join/leave counts, max-delta pauses, and any compile
        errors from the most recent reconcile pass.
      responses:
        "200":
          description: The latest compile pass summary.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CompileStatus" }
  /baselines:
    get:
      operationId: listBaselines
      summary: List declared Baselines
      description: >
        Baselines are CaC-only checkable desired state (charter §2.4,
        ADR-0019): a View selector + check Step + remediation Workflow ref +
        cadence. This surface is read-only; Git review authorizes the
        Principal binding.
      responses:
        "200":
          description: Every declared Baseline.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Baseline" }
  /baselines/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getBaseline
      summary: Get a declared Baseline
      responses:
        "200":
          description: The Baseline declaration.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Baseline" }
        "404": { $ref: "#/components/responses/NotFound" }
  /compliance/{framework}:
    parameters:
      - name: framework
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getComplianceReport
      summary: Compliance rollup for a framework
      description: >
        Aggregates framework-tagged Baselines (the controls) and their open
        Findings into a per-View posture score (charter §2.4). A control passes
        when no target in its View has an open Finding for it. Read-only over
        the existing Baseline/Finding surface — the benchmark is data, a pack
        ships the controls (ADR-0033).
      parameters:
        - name: view
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: The framework's per-View compliance rollup.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ComplianceReport" }
  /findings:
    get:
      operationId: listFindings
      summary: List Findings
      description: >
        Findings are drift/compliance results (charter §2.4): Entity +
        Baseline + observed-vs-expected diff + severity + Evidence ref (the
        check Run). One kind, framework-tagged; resolved Findings are kept as
        the audit history.
      parameters:
        - name: baseline
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [pending, open, resolved] }
        - name: limit
          in: query
          required: false
          schema: { type: integer, format: int64, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Findings, newest observation first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Finding" }
  /findings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFinding
      summary: Get a Finding
      responses:
        "200":
          description: The Finding.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Finding" }
        "404": { $ref: "#/components/responses/NotFound" }
  /findings/{id}/evidence:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getFindingEvidence
      summary: Get a Finding's Evidence manifest
      description: >
        The manifest for the Finding's sealed, object-locked audit bundle
        (charter §2.4, ADR-0029) — object key, sha256 integrity anchor, size,
        and retain-until. 404 when the Finding has no sealed Evidence.
      responses:
        "200":
          description: The Evidence manifest.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Evidence" }
        "404": { $ref: "#/components/responses/NotFound" }
  /evidence/{id}/download:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: downloadEvidence
      summary: Download a sealed Evidence bundle (integrity-verified)
      description: >
        Streams the sealed audit bundle after re-verifying its sha256 against
        the manifest (§1.8: a tampered object is detected and refused, never
        served as authentic). 409 when the object fails the integrity check.
      responses:
        "200":
          description: The sealed bundle.
          content:
            application/json:
              schema: { type: object }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: The object failed its integrity check (tampered).
  /triggers:
    get:
      operationId: listTriggers
      summary: List declared Triggers
      description: >
        Triggers are CaC-only (ADR-0010): declared in the Git desired-state
        repo, where review authorizes the Principal binding. This surface is
        read-only; there is no API write path.
      responses:
        "200":
          description: Every declared Trigger.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Trigger" }
  /triggers/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getTrigger
      summary: Get one Trigger with its live schedule state
      description: >
        The declaration plus the Temporal Schedule's observed state — paused,
        next fire times, and the workflow ids of recent fired Runs: the
        Trigger → Run rung of the descent ladder (charter §1.8).
      responses:
        "200":
          description: The Trigger and its schedule state.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TriggerDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workflows:
    get:
      operationId: listWorkflows
      summary: List declared Workflows
      description: >
        Workflows are CaC-only in v1 (ADR-0011): declared in the Git
        desired-state repo. This surface is read-only.
      responses:
        "200":
          description: Every declared Workflow.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Workflow" }
  /workflows/{name}:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getWorkflow
      summary: Get one Workflow declaration
      responses:
        "200":
          description: The Workflow.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Workflow" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workflows/{name}/runs:
    parameters:
      - name: name
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: startWorkflowRun
      summary: Start one execution of a Workflow
      description: >
        The launching Principal rides every actuation Step's credential
        `use` check (charter §2.5), exactly as if it had started each Run
        directly.
      responses:
        "201":
          description: The created WorkflowRun.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowRun" }
        "404": { $ref: "#/components/responses/NotFound" }
  /workflow-runs:
    get:
      operationId: listWorkflowRuns
      summary: List recent WorkflowRuns
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, format: int64, minimum: 1, maximum: 500, default: 100 }
      responses:
        "200":
          description: Recent executions, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WorkflowRun" }
  /workflow-runs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    get:
      operationId: getWorkflowRun
      summary: Get one WorkflowRun with per-Step outcomes
      description: >
        The Workflow → Run rung of the descent ladder (charter §1.8): each
        actuation Step links its Run id (tail its events via
        /runs/{id}/events), each Gate Step its Gate.
      responses:
        "200":
          description: The execution and its Steps.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WorkflowRunDetail" }
        "404": { $ref: "#/components/responses/NotFound" }
  /gates:
    get:
      operationId: listGates
      summary: List Gates (the approval inbox)
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, denied, expired]
      responses:
        "200":
          description: Gates, newest first.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Gate" }
  /gates/{id}/decision:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
    post:
      operationId: decideGate
      summary: Approve or deny a pending Gate
      description: >
        Requires an authenticated Principal that the Gate's approver policy
        authorizes — listed explicitly or a member of an approver team
        (checked through the platform Authorizer, ADR-0009/0011). The
        decision is delivered to the waiting Workflow as a signal; the
        Workflow records it (202).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GateDecision" }
      responses:
        "202":
          description: Decision accepted and signaled to the Workflow.
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
components:
  parameters:
    ViewName:
      name: name
      in: path
      required: true
      schema: { type: string }
      description: View name (the `view://<name>` reference without scheme).
    RunID:
      name: id
      in: path
      required: true
      schema: { type: string }
  responses:
    NotFound:
      description: The named object does not exist
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    BadRequest:
      description: The request is malformed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: The object is owned by another declaration path
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: The Principal lacks the required grant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: >
        A Bearer token was presented but could not be verified (invalid,
        expired, or wrong issuer/audience). Written by the Principal
        middleware — a bad credential is 401, never downgraded to anonymous;
        an absent credential is anonymous and denied per-grant (403).
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      required: [message]
      properties:
        message: { type: string }
    Provenance:
      type: object
      description: >
        Per-attribute stamp — which Run/Syncer wrote the value, when, from
        which Source (charter §2.1). Always exactly one answer.
      required: [writerKind, writerRef, at]
      properties:
        writerKind: { type: string, enum: [syncer, run] }
        writerRef: { type: string }
        sourceId: { type: string }
        at: { type: string, format: date-time }
    Entity:
      type: object
      required: [id, kind, identityKeys, labels]
      properties:
        id: { type: string }
        kind: { type: string }
        identityKeys:
          type: object
          additionalProperties: { type: string }
        labels:
          type: object
          additionalProperties: { type: string }
    Facet:
      type: object
      required: [namespace, value, provenance]
      properties:
        namespace: { type: string }
        value:
          description: The Facet document fragment (schema attaches per namespace, §1.1).
        provenance: { $ref: "#/components/schemas/Provenance" }
    EntityDocument:
      type: object
      required: [entity, facets]
      properties:
        entity: { $ref: "#/components/schemas/Entity" }
        facets:
          type: array
          items: { $ref: "#/components/schemas/Facet" }
    FacetPredicate:
      type: object
      required: [namespace, equals]
      properties:
        namespace: { type: string }
        path: { type: string }
        equals:
          description: JSON value the addressed field must equal.
    ViewSelector:
      type: object
      description: >
        Structured selector data — deliberately not an expression language
        (charter non-goal; ADR-0003 review).
      properties:
        kinds:
          type: array
          items: { type: string }
        labels:
          type: object
          additionalProperties: { type: string }
        facets:
          type: array
          items: { $ref: "#/components/schemas/FacetPredicate" }
    View:
      type: object
      required: [name, version, selector]
      properties:
        name: { type: string }
        version: { type: integer, format: int64 }
        selector: { $ref: "#/components/schemas/ViewSelector" }
        declaredBy:
          type: string
          enum: [api, cac]
          readOnly: true
          description: >
            Which declaration path owns this View — cac (Git-declared desired
            state, charter §1.2) or api. cac Views are Git-only.
    ViewDeclaration:
      type: object
      required: [name, selector]
      properties:
        name: { type: string }
        selector: { $ref: "#/components/schemas/ViewSelector" }
    CredentialInjection:
      type: object
      required: [key, as, name]
      properties:
        key: { type: string, description: Field within the backend material. }
        as: { type: string, enum: [env, file] }
        name: { type: string, description: Env var name or path under the pod credentials mount. }
    CredentialRef:
      type: object
      description: >
        Pointer + injection policy to brokered secret material (charter
        §2.5). Material never persists in the platform and has no read path.
      required: [name, ownerTeam, backend, locator, injection]
      properties:
        name: { type: string }
        ownerTeam: { type: string }
        backend:
          type: string
          enum: [k8s-secret, vault, workload-identity]
        locator:
          type: object
          description: "Backend-shaped address (k8s-secret: namespace, name)."
        injection:
          type: array
          items: { $ref: "#/components/schemas/CredentialInjection" }
        declaredBy:
          type: string
          enum: [api, cac]
          readOnly: true
    DesiredState:
      type: object
      description: The full declared desired state (charter §1.2).
      required: [views]
      properties:
        views:
          type: array
          items: { $ref: "#/components/schemas/ViewDeclaration" }
        credentialRefs:
          type: array
          items: { $ref: "#/components/schemas/CredentialRef" }
        triggers:
          type: array
          items: { $ref: "#/components/schemas/Trigger" }
        workflows:
          type: array
          items: { $ref: "#/components/schemas/Workflow" }
        emitters:
          type: array
          items: { $ref: "#/components/schemas/Emitter" }
        baselines:
          type: array
          items: { $ref: "#/components/schemas/Baseline" }
        mcpServers:
          type: array
          items: { $ref: "#/components/schemas/MCPServer" }
        intents:
          type: array
          items: { $ref: "#/components/schemas/Intent" }
        assignments:
          type: array
          items: { $ref: "#/components/schemas/Assignment" }
        blueprints:
          type: array
          items: { $ref: "#/components/schemas/Blueprint" }
        sites:
          type: array
          items: { $ref: "#/components/schemas/Site" }
    PlanEntry:
      type: object
      required: [name, action, memberCount]
      properties:
        kind:
          type: string
          enum: [view, credential-ref, trigger, workflow, emitter, baseline, mcp-server, intent, assignment, blueprint, site]
        name: { type: string }
        action:
          type: string
          enum: [create, update, adopt, noop, delete]
        memberCount:
          type: integer
          format: int64
          description: Live Entity count the relevant selector matches now.
        oldSelector: { $ref: "#/components/schemas/ViewSelector" }
        newSelector: { $ref: "#/components/schemas/ViewSelector" }
        paramDependent:
          type: boolean
          description: >
            A parametrized View whose membership binds at launch — memberCount
            is not meaningful and is omitted (ADR-0024).
        error: { type: string }
    Plan:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items: { $ref: "#/components/schemas/PlanEntry" }
    ViewResolution:
      type: object
      required: [view, entities]
      properties:
        view: { $ref: "#/components/schemas/View" }
        entities:
          type: array
          items: { $ref: "#/components/schemas/Entity" }
    StartRun:
      type: object
      description: >
        One Step: an Actuator against a View (charter §2.3: Actuator + content +
        params), or a targetless Connector Action (Action + params, ADR-0031).
        Set viewName+actuator OR action, not both.
      properties:
        viewName: { type: string }
        actuator:
          type: string
          enum: [ansible, script, opentofu, mcp]
          default: ansible
        action:
          type: string
          description: >
            A Connector Action (namespaced, e.g. certissuer/revoke). When set,
            this is a targetless typed operation — viewName/actuator are ignored
            and the CredentialRef `use` grant is the authz gate, not runner-on-View.
        dryRun:
          type: boolean
          description: Ask a DryRunnable Action to plan without side effects.
        params:
          type: object
          description: Actuator- or Action-interpreted Step params.
        slices:
          type: integer
          format: int64
          minimum: 1
          default: 1
          description: >
            Partition the target set across this many parallel execution
            Jobs (clamped to the target count).
        credentialRefs:
          type: array
          items: { type: string }
          description: >
            CredentialRef names to project into the execution pods. The
            launching Principal needs the `use` grant on each (checked at
            dispatch; use never implies read — charter §2.5).
    Run:
      type: object
      required: [id, workflowId, status, startedAt]
      properties:
        id: { type: string }
        workflowId: { type: string }
        status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        viewRef: { type: string }
        viewVersion: { type: integer, format: int64 }
        triggeredBy:
          type: string
          description: >
            Name of the Trigger that fired this Run; absent for manual/API
            launches (charter §1.8 descent, Trigger → Run).
        baseline:
          type: string
          description: >
            Name of the Baseline whose cadence ran this check; absent for
            everything else (charter §1.8 descent, Baseline → Run).
        workflowRunId:
          type: string
          description: >
            The WorkflowRun this Run executed under, when it ran as a
            Workflow Step (charter §1.8 descent, Workflow → Run).
        stepName:
          type: string
          description: The Step within that Workflow.
        outputs:
          type: object
          description: >
            An Action Run's typed output values, validated against the Action's
            output Contract (charter §2.2, ADR-0031); absent for Actuator Runs.
        sites:
          type: array
          items: { type: string }
          description: >
            The execution loci this Run touched (charter §1.8 descent, ADR-0032):
            ["local"], a Site name, or a union when per-target routing fanned the
            Run across Sites. Absent for legacy Runs and targetless Actions.
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
    Site:
      type: object
      description: >
        A remote execution locus — a satellite dispatcher reachable over a NATS
        leaf (charter §2.3, ADR-0032). CaC-declared; live up/down status is
        ephemeral (NATS KV), surfaced via the `live` field on reads.
      required: [name, mode]
      properties:
        name: { type: string }
        mode:
          type: string
          enum: [push, pull]
        namespace:
          type: string
          description: The K8s namespace the Site's agent runs Jobs in.
        description: { type: string }
        declaredBy:
          type: string
          enum: [cac, api]
        live:
          type: boolean
          description: >
            Whether an agent for this Site is currently heartbeating (read-only,
            from the liveness KV; never persisted to the graph, §1.2).
    Emitter:
      type: object
      required: [name, kind, tokenHash]
      properties:
        name: { type: string }
        kind:
          type: string
          enum: [webhook, alertmanager]
        tokenHash:
          type: string
          description: hex(sha256(token)) — never the token itself (§2.5).
    MCPServer:
      type: object
      description: >
        A CaC-declared external MCP server the mcp Actuator may invoke
        (charter §2.3, ADR-0022). stdio servers carry their entire source in
        the declaration — Git review authorizes exactly what the sandbox
        runs. rev keys the pinned tool Contracts (rung 3, drift blocking).
      required: [name, transport, rev]
      properties:
        name: { type: string }
        transport:
          type: string
          enum: [stdio, http]
        rev: { type: integer, format: int64, minimum: 1 }
        script:
          type: string
          description: stdio server source (Git-reviewed, run verbatim).
        endpoint:
          type: string
          description: http server URL.
        tokenRef:
          type: object
          description: CredentialRef pointer for the http bearer token (never material, §2.5).
          required: [credentialRef, key]
          properties:
            credentialRef: { type: string }
            key: { type: string }
    Intent:
      type: object
      description: >
        A declarative document of *what* (charter §2.4), bound to a View by
        an Assignment. CaC-only. v1: Intent/Application.
      required: [name, kind]
      properties:
        name: { type: string }
        kind: { type: string }
        spec: { type: object }
        onRemove:
          type: string
          enum: [retain, revert, remove]
    Assignment:
      type: object
      description: >
        Binds an Intent to a cac-declared View, pinning a Blueprint version
        (charter §2.4). CaC-only.
      required: [name, intent, view, blueprint, blueprintVersion]
      properties:
        name: { type: string }
        intent: { type: string }
        view: { type: string }
        blueprint: { type: string }
        blueprintVersion: { type: integer, format: int64 }
        environments:
          type: array
          items: { type: string }
        maxDelta:
          type: number
          description: Per-Assignment max-delta gate fraction override (§4.3).
        ackDelta:
          type: integer
          format: int64
          description: Acknowledgement token to unblock a paused large delta.
    Blueprint:
      type: object
      description: >
        A versioned composition (Intent × Assignment × View membership →
        Baselines + remediation refs), routed by capability-scoped Facets
        (charter §2.4). CaC-only.
      required: [name, version, for, routes]
      properties:
        name: { type: string }
        version: { type: integer, format: int64 }
        for: { type: string }
        severity:
          type: string
          enum: [info, warning, critical]
        dampingObservations: { type: integer, format: int64 }
        routes:
          type: array
          items: { $ref: "#/components/schemas/BlueprintRoute" }
    BlueprintRoute:
      type: object
      required: [observe, claim]
      properties:
        match:
          type: array
          items: { $ref: "#/components/schemas/FacetPredicate" }
        observe: { $ref: "#/components/schemas/FacetExpectation" }
        claim:
          type: string
          enum: [exclusive, additive]
        remediationWorkflow:
          type: string
          description: Declared Workflow that remediates this route's Findings — a ref only (§5 Flow 2).
    FacetExpectation:
      type: object
      required: [namespace]
      properties:
        namespace: { type: string }
        path: { type: string }
        equals: {}
        contains: {}
    CompileStatus:
      type: object
      description: >
        One Intent-compile pass summary (charter §4.3, ADR-0023).
      properties:
        compiledAt: { type: string, format: date-time }
        compiledBaselines: { type: integer, format: int64 }
        errors:
          type: array
          items: { type: string }
        deltas:
          type: array
          items: { $ref: "#/components/schemas/AssignmentDelta" }
    AssignmentDelta:
      type: object
      required: [assignment, memberCount]
      properties:
        assignment: { type: string }
        memberCount: { type: integer, format: int64 }
        joins:
          type: array
          items: { type: string }
        leaves:
          type: array
          items: { type: string }
        unrouted:
          type: array
          items: { type: string }
        paused: { type: boolean }
        note: { type: string }
    UsageEntry:
      type: object
      description: >
        One (Principal, tool) aggregate of platform-MCP-server calls
        (charter §1.6 accounting per identity, ADR-0021).
      required: [principal, tool, calls, errors, lastCall]
      properties:
        principal: { type: string }
        principalKind:
          type: string
          description: human | service | agent (§2.5 — informational).
        tool: { type: string }
        calls: { type: integer, format: int64 }
        errors: { type: integer, format: int64 }
        lastCall: { type: string, format: date-time }
    Baseline:
      type: object
      description: >
        Checkable desired state (charter §2.4, ADR-0019): View selector +
        check Step + optional remediation Workflow ref + cadence. v1 is the
        hand-written rung of the §6 ladder; checks are read-only by
        construction (ansible check mode, opentofu plan).
      required: [name, viewName, cron, severity]
      properties:
        name: { type: string }
        mode:
          type: string
          description: >
            "" (check Step) or facet-observation (compiler-emitted,
            graph-side check — ADR-0023).
        compiledFrom:
          type: object
          description: >
            Origin of a compiler-emitted Baseline — the §1.8 descent from a
            Finding back to its Assignment/Blueprint (ADR-0023). Absent for
            hand-written Baselines.
          properties:
            assignment: { type: string }
            intent: { type: string }
            blueprint: { type: string }
            blueprintVersion: { type: integer, format: int64 }
            route: { type: integer, format: int64 }
        viewName: { type: string }
        actuator:
          type: string
          enum: [ansible, opentofu]
          default: ansible
        params: { type: object }
        slices: { type: integer, format: int64 }
        credentialRefs:
          type: array
          items: { type: string }
        principal:
          type: string
          description: >
            Service identity the checks execute as (§2.5), exactly like a
            Trigger's.
        cron:
          type: string
          description: Check cadence (a Temporal Schedule actuates it, §3).
        paused: { type: boolean }
        severity:
          type: string
          enum: [info, warning, critical]
          description: Stamped onto every Finding this Baseline raises.
        dampingObservations:
          type: integer
          format: int64
          description: >
            Flap damping (charter §4.3) — a Finding opens only after this
            many consecutive drifted observations. Default 1.
        remediationWorkflow:
          type: string
          description: >
            Declared Workflow that remediates this Baseline's Findings — a
            ref only, never auto-launched (§5 Flow 2, remediation behind
            Gates).
        framework:
          type: string
          description: Compliance tag (e.g. cis) — Findings are framework-tagged (§2.4).
    Evidence:
      type: object
      description: >
        The manifest for a Finding's sealed, object-locked audit bundle (charter
        §2.4, ADR-0029). The immutable bundle lives in the object store; this is
        the graph's pointer to it. sha256 is the tamper-evidence anchor.
      required: [id, findingId, baseline, target, objectKey, sha256, sizeBytes, sealedAt, retainUntil]
      properties:
        id: { type: string }
        findingId: { type: string }
        baseline: { type: string }
        target: { type: string }
        objectKey: { type: string }
        sha256:
          type: string
          description: hex(sha256(bundle)) — the integrity/tamper-evidence anchor.
        sizeBytes: { type: integer, format: int64 }
        sealedAt: { type: string, format: date-time }
        retainUntil:
          type: string
          format: date-time
          description: Object-lock retain-until applied at seal time (WORM on a compliant store).
    Finding:
      type: object
      description: >
        A drift/compliance result (charter §2.4): Entity + Baseline +
        observed-vs-expected diff + severity + Evidence ref. One kind,
        framework-tagged. v1 Evidence is the redacted diff snapshot plus the
        check Run ref (runId).
      required: [id, baseline, target, status, severity, consecutiveDrifted, firstObserved, lastObserved]
      properties:
        id: { type: string }
        baseline: { type: string }
        target: { type: string }
        entityId:
          type: string
          description: >
            The Entity the target resolves to via the View's membership;
            absent for non-Entity targets (e.g. an opentofu workspace).
        status:
          type: string
          enum: [pending, open, resolved]
        severity:
          type: string
          enum: [info, warning, critical]
        framework: { type: string }
        consecutiveDrifted:
          type: integer
          format: int64
          description: Drifted observations since the last clean one (§4.3 damping counter).
        diff:
          description: Latest observed-vs-expected detail (redacted, size-capped visibly).
        runId:
          type: string
          description: The check Run behind the latest observation — the Evidence ref (§1.8).
        firstObserved: { type: string, format: date-time }
        lastObserved: { type: string, format: date-time }
        openedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time }
    ComplianceReport:
      type: object
      description: >
        A framework's compliance posture (charter §2.4, ADR-0033): the
        framework-tagged Baselines are the controls, rolled up per View into a
        score. The benchmark is data — a pack ships the controls.
      required: [framework, views]
      properties:
        framework: { type: string }
        views:
          type: array
          items: { $ref: "#/components/schemas/ComplianceViewScore" }
    ComplianceViewScore:
      type: object
      required: [view, controls, passing, failing, score]
      properties:
        view: { type: string }
        controls:
          type: integer
          format: int64
          description: Framework-tagged Baselines targeting this View.
        passing: { type: integer, format: int64 }
        failing: { type: integer, format: int64 }
        score:
          type: number
          format: double
          description: passing / controls (1.0 when there are no controls).
        failingControls:
          type: array
          items: { $ref: "#/components/schemas/FailingControl" }
    FailingControl:
      type: object
      required: [baseline, severity, openFindings]
      properties:
        baseline: { type: string }
        severity: { type: string, enum: [info, warning, critical] }
        openFindings:
          type: integer
          format: int64
          description: Open Findings this control has raised across the View's targets.
    Contract:
      type: object
      description: >
        A pinned JSON Schema document on a Step's inputs/outputs or a Facet
        namespace (charter §1.5, §2.2) — data, never a language class.
      required: [name, version, rung, hash, schema]
      properties:
        name:
          type: string
          description: e.g. actuators/script.input or facets/os.kernel
        version: { type: integer, format: int64 }
        rung:
          type: string
          enum: [hand-written, tool-derived, mcp-declared]
          description: Derivation-ladder provenance of the schema (§2.2).
        hash:
          type: string
          description: sha256 over the exact document bytes, hex.
        schema:
          type: object
          description: The JSON Schema document.
    Trigger:
      type: object
      description: >
        Anything that starts a Run or Workflow (charter §2): kind schedule
        (Temporal Schedule, ADR-0010) or kind event (Emitter event × CEL
        rule, ADR-0018), executing as the declared service Principal.
      required: [name, kind]
      properties:
        name: { type: string }
        kind:
          type: string
          enum: [schedule, event]
        cron: { type: string }
        paused: { type: boolean }
        emitter:
          type: string
          description: Event source (kind event).
        when:
          type: string
          description: CEL rule over the event payload (kind event).
        cooldownSeconds: { type: integer, format: int64 }
        workflowName:
          type: string
          description: Launch a declared Workflow instead of a single Run.
        viewName: { type: string }
        viewParams:
          type: object
          description: >
            Binds a parametrized View's {{.param.x}} placeholders; values may
            reference the firing event ({{.event.x}}) — ADR-0024.
        actuator: { type: string }
        params: { type: object }
        slices: { type: integer, format: int64 }
        credentialRefs:
          type: array
          items: { type: string }
        principal:
          type: string
          description: >
            Service identity the fired Runs execute as; its `use` grants are
            checked at dispatch exactly like an API launch (§2.5).
    TriggerDetail:
      type: object
      required: [trigger]
      properties:
        trigger: { $ref: "#/components/schemas/Trigger" }
        schedule: { $ref: "#/components/schemas/TriggerScheduleState" }
    Workflow:
      type: object
      description: >
        A Temporal-backed DAG of Steps with Gates (charter §2, ADR-0011).
        CaC-only in v1.
      required: [name, steps]
      properties:
        name: { type: string }
        steps:
          type: array
          items: { $ref: "#/components/schemas/Step" }
    Step:
      type: object
      description: >
        One DAG node — an actuation (Actuator + params against a View,
        charter §2.3) or a Gate; exactly one shape is set.
      required: [name]
      properties:
        name: { type: string }
        needs:
          type: array
          items: { type: string }
          description: Step names that must reach a terminal state first.
        when:
          type: string
          enum: [success, failure, always]
          description: >
            Edge condition on the needs' outcomes; success is the default
            (all needs succeeded).
        gate: { $ref: "#/components/schemas/GateSpec" }
        viewName: { type: string }
        actuator: { type: string }
        params: { type: object }
        slices: { type: integer, format: int64 }
        credentialRefs:
          type: array
          items: { type: string }
    GateSpec:
      type: object
      required: [approvers]
      properties:
        approvers: { $ref: "#/components/schemas/GateApprovers" }
        timeoutSeconds:
          type: integer
          format: int64
          description: >
            Expire (treat as denial) after this long pending; 0 waits
            forever.
    GateApprovers:
      type: object
      description: >
        Who may decide: Principals listed explicitly, or members of the
        listed teams (checked through the platform Authorizer).
      properties:
        principals:
          type: array
          items: { type: string }
        teams:
          type: array
          items: { type: string }
    Gate:
      type: object
      required: [id, workflowRunId, step, status, approvers, createdAt]
      properties:
        id: { type: string }
        workflowRunId: { type: string }
        step: { type: string }
        status:
          type: string
          enum: [pending, approved, denied, expired]
        approvers: { $ref: "#/components/schemas/GateApprovers" }
        decidedBy: { type: string }
        note: { type: string }
        createdAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time }
    GateDecision:
      type: object
      required: [approve]
      properties:
        approve: { type: boolean }
        note: { type: string }
    WorkflowRun:
      type: object
      required: [id, workflowName, status, startedAt]
      properties:
        id: { type: string }
        workflowName: { type: string }
        temporalId: { type: string }
        triggeredBy:
          type: string
          description: Trigger that fired this execution (§1.8 descent).
        status:
          type: string
          enum: [pending, running, succeeded, failed, canceled]
        principal: { type: string }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
    WorkflowRunDetail:
      type: object
      required: [workflowRun, steps]
      properties:
        workflowRun: { $ref: "#/components/schemas/WorkflowRun" }
        steps:
          type: array
          items:
            type: object
            required: [name]
            properties:
              name: { type: string }
              status:
                type: string
                description: >
                  Terminal outcome from the WorkflowRun summary (succeeded,
                  failed, skipped); absent while the execution is live —
                  descend into the linked Run or Gate for live state.
              runId:
                type: string
                description: The Step's Run (actuation Steps).
              gateId:
                type: string
                description: The Step's Gate (Gate Steps).
    TriggerScheduleState:
      type: object
      description: >
        Observed Temporal Schedule state; absent when the schedule has not
        been reconciled yet (e.g. within one interval of declaring).
      properties:
        paused: { type: boolean }
        nextFireTimes:
          type: array
          items: { type: string, format: date-time }
        recentRuns:
          type: array
          description: Workflow executions recently started by this Trigger.
          items:
            type: object
            required: [workflowId, at]
            properties:
              workflowId: { type: string }
              at: { type: string, format: date-time }
