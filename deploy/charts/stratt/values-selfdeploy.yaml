# M2 self-deploy overlay (ADR-0092): deploys the Helm Actuator plugin in-cluster and
# the tiny demo chart it will install, so Stratt materializes a Kubernetes release
# through its OWN reconcile/actuator loop. Layer ON TOP of values-allinone.yaml.
# Release name "stratt" (any namespace — service names are release-prefixed). DEV.

# Ship the demo chart ConfigMaps (templates/helm-demo-chart.yaml): the hello marker
# (M2, ADR-0092) and the OpenFGA-memory service chart (the genesis dogfood, ADR-0102).
helmDemoChart: true
helmOpenfgaChart: true

plugins:
  - name: helm
    image:
      repository: stratt-plugin-helm
      tag: dev
      pullPolicy: Never # kind-loaded (task image:helm-plugin)
    tmpDir: true # writable /tmp for helm's cache (read-only rootfs)
    demoChart: true # mount the hello chart at /charts/hello
    openfgaChart: true # mount the openfga-memory chart at /charts/openfga-memory (ADR-0102)
    env:
      STRATT_HELM_CHART_ROOT: /charts
    # Self-deploy RBAC CONFINED to the one pre-created target namespace (ADR-0102 Q3 /
    # ADR-0092 required model): deployNamespace renders a namespaced Role+RoleBinding in
    # stratt-authz instead of a cluster-wide ClusterRole — so the self-deploy SA has NO
    # cluster-wide `secrets` reach and cannot touch any other namespace's brokerable
    # Secrets (§2.5). Scoped to the kinds the openfga-memory chart touches; never
    # cluster-admin, never namespace-create (the namespace is pre-created out-of-band).
    deployNamespace: stratt-authz
    # Write access to exactly the kinds the release creates (openfga-memory: a
    # Deployment + Service; helm also writes its release Secret + ConfigMaps).
    kubeAccess:
      apiGroups: ["", "apps"]
      resources: ["configmaps", "services", "deployments", "serviceaccounts", "secrets"]
      verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    # READ-ONLY, separate rule (least authority): helm --wait watches Pods + ReplicaSets
    # to confirm rollout readiness — without it, --wait never observes Ready and the deploy
    # hangs until cancelled. The self-deploy plugin never mutates these.
    kubeAccessRead:
      apiGroups: ["", "apps"]
      resources: ["pods", "replicasets"]
      verbs: ["get", "list", "watch"]
