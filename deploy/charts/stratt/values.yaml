# Stratt chart values (ADR-0013).
#
# Secrets NEVER inline in production values (§2.5): every credential-bearing
# setting has an existingSecret form; the inline form is a dev convenience
# and NOTES.txt warns loudly when it is used.
#
# Digest pinning (§7.3): every image accepts `digest`, which wins over `tag`.
# Production manifests must pin digests; NOTES.txt warns on floating tags.

image:
  repository: stratt/strattd
  tag: dev
  digest: "" # e.g. sha256:… — wins over tag when set
  pullPolicy: IfNotPresent

replicas: 1

# High availability (ADR-0040). For replicas > 1, enable leaderElection so the
# singleton controllers (audit sealer, syncers, reconcilers, trigger engine,
# notifier, Salt emitter) run only on the elected leader; the REST API and the
# Temporal worker run on every replica. Multi-replica also requires the OpenFGA
# server backend (openfga.enabled / external) — the in-process authz evaluator
# is single-replica only.
leaderElection:
  enabled: false
# PodDisruptionBudget keeps a quorum of API replicas serving during voluntary
# disruptions (node drains, rollouts). Rendered only when replicas > 1.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  host: ""
  annotations: {}
  tls: [] # standard networking.k8s.io/v1 tls entries

# ── substrate endpoints (bring-your-own) ────────────────────────────────────
database:
  # Postgres DSN. Use existingSecret in production (url is dev-only).
  url: ""
  existingSecret:
    name: ""
    key: "url"

nats:
  url: "" # nats://…; credential-less dev URLs may inline
  existingSecret:
    name: ""
    key: "url"

temporal:
  address: "temporal-frontend:7233"
  namespace: "default"

# ── in-cluster DEV substrate (opt-in; self-contained bootstrap) ──────────────
# Default stays bring-your-own (ADR-0013 / §1.4). The `allInOne` profile
# (values-allinone.yaml) flips inCluster.enabled so a single `helm install`
# stands up Postgres/NATS/Temporal in-namespace — "nothing -> Stratt in kube"
# with no compose stack. DEV ONLY: ephemeral emptyDir storage, inline dev creds,
# a standalone in-memory Temporal dev server. Blessed upstream images, NO
# third-party Helm subchart (avoids Bitnami-style relicensing exposure, §1.3/§1.7).
# Wire database.url / nats.url / temporal.address at the in-cluster Services when
# enabling (values-allinone.yaml does this). Never enable in production.
substrate:
  inCluster:
    enabled: false
    postgres:
      image: postgres:18 # pin a digest for reproducibility (§7.3)
      user: stratt
      password: stratt-dev # dev-only; NOTES warns. Never a production credential.
      db: stratt
    nats:
      image: nats:2.10-alpine
    temporal:
      image: temporalio/temporal:latest # dev CLI dev-server; pin a digest for repro (§7.3)
      namespace: default
    resources:
      requests: { cpu: 50m, memory: 64Mi }
      limits: { memory: 512Mi }

# ── schema migrations & rolling-upgrade discipline (UPG-1, ADR-0078) ─────────
# By default each pod runs goose migrations at boot (idempotent, advisory-locked).
# For a safe rolling upgrade, enable the hook: a Helm pre-install/pre-upgrade Job
# applies the schema ONCE before the serving pods roll (they then boot with
# STRATT_SKIP_MIGRATE), so N replicas never race Up(). Requires expand/contract-
# compatible migrations (each release's schema stays compatible with the prior
# release's code — enforced by `task migrate:lint`).
migrations:
  hook:
    enabled: false
    backoffLimit: 3

# ── Evidence store: object-locked WORM compliance bundles (§2.4, ADR-0029) ───
# enterprise-readiness DR-1. Without a bucket, Findings open UNSEALED and no
# tamper-evident evidence is ever object-locked. The daemon REFUSES TO BOOT in a
# production environment (env.name production/prod) with no bucket unless
# allowUnsealed=true — a compliance platform must not silently skip WORM.
evidence:
  # S3-compatible bucket for sealed evidence. Empty ⇒ disabled (see the boot probe).
  bucket: ""
  # S3 API endpoint (any S3-compatible store; empty ⇒ AWS default resolver / real S3).
  endpoint: ""
  region: "us-east-1"
  retentionDays: 365
  # Explicitly acknowledge running UNSEALED in production (bypasses the boot
  # probe). Leave false in prod unless you truly do not want compliance evidence.
  allowUnsealed: false
  # Object-store credentials via the standard AWS env chain (AWS_ACCESS_KEY_ID /
  # AWS_SECRET_ACCESS_KEY). Prefer existingSecret; on EKS/IRSA leave both empty and
  # attach the role to the ServiceAccount.
  existingSecret:
    name: ""
    accessKeyKey: "AWS_ACCESS_KEY_ID"
    secretKeyKey: "AWS_SECRET_ACCESS_KEY"

# ── Postgres backup (enterprise-readiness DR-1) ──────────────────────────────
# The graph is a rebuildable projection, but Run provenance + the per-Cell audit
# chain are NOT rebuildable (DR-2). This opt-in CronJob pg_dumps the database to a
# mounted PVC on a schedule. Off by default (a PVC + the operator's own PITR may
# already cover it); pair with Postgres PITR for a real RPO. Restore drill:
# `task dr:restore-test`.
backup:
  enabled: false
  schedule: "0 2 * * *" # daily 02:00
  image: postgres:18
  # Retention: the CronJob keeps this many successful dumps on the PVC.
  keep: 7
  persistentVolume:
    size: 10Gi
    storageClass: "" # "" ⇒ cluster default
  # The DSN to dump. Empty ⇒ reuse database.url / database.existingSecret.
  databaseUrl: ""

# ── SIEM audit forwarder (ADR-0034, enterprise-readiness DR-1) ───────────────
# The vendor-neutral forwarder ships the one audit stream to a SIEM Sink. It had a
# Dockerfile but no Helm Deployment, so it was undeployable. Opt-in.
forwarder:
  enabled: false
  image:
    repository: stratt/stratt-forwarder
    tag: "dev"
    digest: ""
    pullPolicy: IfNotPresent
  # The SIEM Sink name (declared in the estate, ADR-0034). Required when enabled.
  sink: ""
  # Platform API base the forwarder polls. Empty ⇒ the in-cluster service.
  server: ""
  batch: 200
  intervalSeconds: 5
  # The forwarder's own OIDC bearer token (a service Principal on audit:log), via secret.
  existingSecret:
    name: ""
    tokenKey: "token"

# ── control-plane Cell (ADR-0044) ───────────────────────────────────────────
# Multi-region DR is done by REPOINTING the substrate env strings above
# (database.url / nats.url / temporal.address / evidence store) to a Cell's
# promoted DR replica set — there is no separate _REPLICA value. Cell failover
# and the fenced Source re-home procedure are in docs/runbooks/cell-failover-drill.md.
# Multi-region: leave id "" for the built-in single-Cell "local" (today's
# deployment, byte-identical). Set id to this Cell's name to scope the leader
# lease, Temporal namespace/queue, and every NATS stream/subject (slice 6) so
# peer Cells sharing substrate never collide. dispatchPrefix optionally
# overrides the NATS scope token (must equal graph.cell.dispatch_prefix, or the
# daemon loud-fails at boot). EVERY Site agent in this Cell must carry the same
# id/dispatchPrefix. secretName references a fleet-wide Secret holding the
# cross-Cell HMAC key (STRATT_CELL_SECRET, slice 4).
cell:
  id: ""
  dispatchPrefix: ""
  secretName: ""
  secretKey: "cell-secret"

# ── active environment (ADR-0057) ───────────────────────────────────────────
# The logical dev/staging/prod slice this daemon reconciles — a DIFFERENT axis
# from cell (cell = physical residency; environment = logical slice within it).
# Empty ⇒ unscoped: reconciles every declaration (byte-identical to pre-ADR-0057).
# When set, the reconcile applies + prunes ONLY declarations tagged for this
# environment (or untagged); a dev cell never fires prod's schedules.
environment: ""

# ── identity + authorization (ADR-0009) ─────────────────────────────────────
oidc:
  issuer: ""
  audience: ""
  # Dev-only, explicit opt-out: issuer without audience refuses to boot
  # otherwise (slice-5 guardian flag; ADR-0013).
  allowNoAudience: false
  # Multi-issuer workload identity (ADR-0101): a LIST of trusted OIDC issuers,
  # each verified independently, each contributing an issuer-scoped Principal
  # namespace (I-1: the resolver PREPENDS subNamespace to the verified `sub`, so
  # a `sub` from one issuer can never become another issuer's Principal). Renders
  # to STRATT_OIDC_ISSUERS (JSON) and takes precedence over the single `issuer`
  # above. Use this for "per-Cell OpenBao for workloads + optional Zitadel for
  # humans" on one Cell. Each entry: {issuer, audience, subNamespace, alias}.
  # subNamespace MUST be non-empty and pairwise-disjoint when more than one issuer.
  issuers: []
  #  - issuer: "https://openbao.cell.svc/v1/identity/oidc"
  #    audience: "stratt"
  #    subNamespace: "openbao/"
  #    alias: "openbao"

# In-cluster OpenFGA subchart (postgres engine; its chart runs
# `openfga migrate` as a hook). Values under `openfga:` pass through to the
# official chart; stratt wires STRATT_OPENFGA_URL to its service.
openfga:
  enabled: false
  image:
    # The ADR-0009 vetted server version (the chart's default appVersion may
    # run ahead of the scouted pin — never let the chart drift the server).
    tag: v1.17.0
  datastore:
    engine: postgres
    # DSN via a pre-provisioned Secret only (§2.5) — never `datastore.uri`:
    #   existingSecret: <secret name>
    #   secretKeys: { uriKey: uri }
    existingSecret: ""
    secretKeys:
      uriKey: uri
    # `openfga migrate` runs as a chart hook Job before the server rolls.
    applyMigrations: true
    waitForMigrations: true
    migrationType: job
  replicaCount: 1
  # The chart's bundled Bitnami DB subcharts stay OFF (scout: legacy-image
  # governance risk; Postgres is bring-your-own like the rest of the spine).
  postgresql:
    enabled: false
  mysql:
    enabled: false

# External OpenFGA (when the subchart is disabled). Empty ⇒ the in-process
# tuple evaluator answers checks (no server).
externalOpenfga:
  url: ""

# The X-Stratt-Principal dev header (ADR-0009). NEVER enable in production;
# NOTES.txt shouts when set.
devPrincipalHeader: false

# ── OpenTofu state backend (ADR-0016) ────────────────────────────────────────
stateBackend:
  # 32-byte hex key enables the encrypted HTTP state backend and the
  # opentofu Actuator. Use existingSecret in production (inline is dev-only;
  # NOTES.txt warns). Empty ⇒ backend off, opentofu Steps refuse to run.
  key: ""
  existingSecret:
    name: ""
    key: "state-key"
  # URL execution pods use to reach strattd; defaults to the chart Service.
  url: ""

# ── execution plane ──────────────────────────────────────────────────────────
ee:
  image:
    repository: stratt-ee
    tag: dev
    digest: ""
  fsGroup: 1000

# ── CaC declarations (desired state, §1.2) ──────────────────────────────────
declarations:
  # git-sync sidecar delivers the declarations checkout; strattd reconciles
  # the synced directory every interval (plain-dir mode — no git in the
  # strattd image).
  gitSync:
    enabled: false
    repo: ""
    ref: "main"
    periodSeconds: 30
    image:
      repository: registry.k8s.io/git-sync/git-sync
      tag: v4.4.2
      digest: ""
    # Secret with git-sync credential env vars (GITSYNC_USERNAME/
    # GITSYNC_PASSWORD or GITSYNC_SSH_KEY_FILE mounts) — optional for
    # public/anonymous repos.
    existingSecret: ""
  interval: "30s"
  maxPruneFraction: "" # "" ⇒ controller default 0.5
  # inline delivers a CaC checkout as a chart-rendered ConfigMap (no git server,
  # no baked image) — the dev/e2e path. The reconciled /estate is staged under
  # the chart at dev/declarations/** by `task dev:stage-estate`; keys are restored
  # to their nested paths on mount. Mutually exclusive with gitSync (git-sync is
  # the production path).
  inline:
    enabled: false
    interval: "30s"
    # "" ⇒ controller default (0.5). Dev installs whose inline set is the whole
    # authoritative desired state raise this to prune stale cac on a dirty graph.
    maxPruneFraction: ""

# ── gRPC plugins deployed in-cluster (ADR-0046) ──────────────────────────────
# Each entry renders a Deployment + Service serving the sovereign plugin port on
# :9090, and auto-wires STRATT_<NAME>_PLUGIN_ADDR into strattd so it dials the
# in-cluster Service. This is the prod-aligned home for every gRPC plugin
# (vcenter/opentofu/openbao/msgraph/awsec2…). Empty ⇒ no plugins deployed.
# Entry shape:
#   - name: vcenter                     # Deployment/Service "<release>-vcenter"; env key STRATT_VCENTER_PLUGIN_ADDR
#     image: {repository, tag, digest, pullPolicy}
#     env: {STRATT_VCENTER_URL: "...", ...}   # env for the PLUGIN pod
#     hostEnv: {STRATT_VCENTER_SOURCE_NAME: "..."}  # extra env injected into strattd
#     secretNamespace: ""               # when set, a confined get-Secrets Role there (SecretBroker, §2.5)
plugins: []

# ── network microsegmentation (enterprise-readiness SEC-3) ───────────────────
# Default-deny egress + ingress for the three workload classes (control plane,
# gRPC plugins, and the ephemeral EE Jobs that run arbitrary tool content), with
# an allow-list for DNS + in-namespace substrate + operator-declared external
# endpoints. OPT-IN: enabling this without declaring the egress your deployment
# needs (managed Postgres/OIDC/object-store/cloud/webhook targets) WILL break
# those calls. A NetworkPolicy that silently drops substrate egress is exactly the
# hidden failure §1.8 forbids, so it stays off until you scope it — then it is the
# recommended production posture (a CNI that enforces NetworkPolicy is required).
networkPolicy:
  enabled: false
  # kube-dns's namespace; egress to :53 (UDP+TCP) is always allowed so name
  # resolution keeps working under default-deny.
  dnsNamespace: kube-system
  # Allow egress to every pod in the release namespace. The self-contained profile
  # runs Postgres/NATS/Temporal/OpenFGA/plugins in-namespace, so this keeps it
  # working. Set false to lock down to only the extraEgress CIDRs (managed/external
  # substrate) — the tightest posture.
  allowSameNamespaceEgress: true
  # External endpoints the CONTROL PLANE must reach: managed Postgres, the OIDC
  # issuer, S3/object store, cloud provider APIs, webhook actuator targets. Each:
  # {cidr, ports?}. Omit ports to allow all ports to that CIDR.
  extraEgress: []
  #  - cidr: 10.0.0.0/8
  #    ports:
  #      - {protocol: TCP, port: 5432}
  # External endpoints the PLUGIN pods must reach (the systems of record they
  # broker — vCenter, cloud APIs, a Chef/Puppet server…). Same shape as extraEgress.
  extraPluginEgress: []
  # External endpoints the EE JOB pods must reach (the infra a tool actuates —
  # cloud APIs, target hosts). Same shape. Kept deliberately separate so the
  # arbitrary-content pods get the narrowest, most-scrutinized allow-list.
  extraJobEgress: []
  # namespaceSelector matchLabels for namespaces allowed to reach the API on :8080
  # (an ingress controller, peer Cells). Empty ⇒ same-namespace clients only.
  apiIngressNamespaces: []
  #  - kubernetes.io/metadata.name: ingress-nginx

# ── observability (enterprise-readiness OBS-1) ───────────────────────────────
# The daemon always serves Prometheus metrics at :8080/metrics (SLO signals with
# zero collector). Set otlpEndpoint to also push traces + metrics over OTLP/gRPC.
observability:
  # OTEL_EXPORTER_OTLP_ENDPOINT (e.g. http://otel-collector:4317). Empty ⇒ traces
  # are a no-op; /metrics still serves.
  otlpEndpoint: ""
  # Extra OTEL_* env passthrough (headers, protocol, sampling…). Map of name→value.
  otlpEnv: {}
  #  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  # A Prometheus-Operator PodMonitor scraping :8080/metrics. Opt-in (requires the
  # PodMonitor CRD). Off by default so a cluster without the operator still installs.
  podMonitor:
    enabled: false
    interval: 30s
    # Extra labels so the operator's podMonitorSelector picks it up (e.g. release: kube-prometheus).
    labels: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 512Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532 # distroless nonroot
  runAsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

nodeSelector: {}
tolerations: []
affinity: {}
