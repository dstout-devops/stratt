apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "stratt.fullname" . }}
  labels: {{- include "stratt.labels" . | nindent 4 }}
---
# The dispatcher's exact K8s surface (charter §3: Jobs are the only
# execution primitive) — nothing broader (ADR-0013). Namespace-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stratt.fullname" . }}-dispatcher
  labels: {{- include "stratt.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stratt.fullname" . }}-dispatcher
  labels: {{- include "stratt.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stratt.fullname" . }}-dispatcher
subjects:
  - kind: ServiceAccount
    name: {{ include "stratt.fullname" . }}
    namespace: {{ .Release.Namespace }}
