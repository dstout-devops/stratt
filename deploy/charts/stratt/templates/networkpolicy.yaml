{{- /*
Network microsegmentation (enterprise-readiness SEC-3). Default-deny egress +
ingress for the three workload classes, with a curated allow-list. The mere
existence of a NetworkPolicy selecting a pod flips it to default-deny for the
policyTypes it names; every rule below is therefore an explicit allow.

  1. control plane (strattd)  — egress: DNS + in-ns substrate + extraEgress;
                                 ingress: :8080 from in-ns + apiIngressNamespaces.
  2. plugin pods              — ingress: :9090 from strattd ONLY;
                                 egress: DNS + in-ns (SecretBroker via strattd) + extraPluginEgress.
  3. EE Job pods (arbitrary   — ingress: DENY-ALL (nothing dials a Job);
     tool content)              egress: DNS + strattd:8080 (state backend) + extraJobEgress.

Requires a CNI that enforces NetworkPolicy (Cilium/Calico/…); on a CNI that
ignores it this renders but does nothing — enable it only where it is enforced.
*/ -}}
{{- if .Values.networkPolicy.enabled }}
{{- $np := .Values.networkPolicy }}
{{- $dnsNs := $np.dnsNamespace | default "kube-system" }}
---
# 1. Control plane (strattd)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stratt.fullname" . }}-control-plane
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "stratt.selectorLabels" . | nindent 6 }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        # Same-namespace clients (UI/CLI in-cluster, peer relays, the ingress
        # controller if it runs here).
        - podSelector: {}
        {{- range $np.apiIngressNamespaces }}
        - namespaceSelector:
            matchLabels: {{- toYaml . | nindent 14 }}
        {{- end }}
      ports:
        - {protocol: TCP, port: 8080}
  egress:
    # DNS — always allowed, or nothing resolves under default-deny.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    {{- if $np.allowSameNamespaceEgress }}
    # In-namespace substrate (Postgres/NATS/Temporal/OpenFGA) + plugin pods.
    - to:
        - podSelector: {}
    {{- end }}
    {{- range $np.extraEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      {{- with .ports }}
      ports: {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- if .Values.plugins }}
---
# 2. gRPC plugin pods — reachable only by strattd on the sovereign port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stratt.fullname" . }}-plugins
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: plugin
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels: {{- include "stratt.selectorLabels" . | nindent 14 }}
      ports:
        - {protocol: TCP, port: 9090}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    {{- if $np.allowSameNamespaceEgress }}
    # Same-namespace: the control plane brokers per-call secrets to plugins (§2.5).
    - to:
        - podSelector: {}
    {{- end }}
    {{- range $np.extraPluginEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      {{- with .ports }}
      ports: {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
---
# 3. EE Job pods (the one place arbitrary tool content runs). No ingress at all;
#    egress only to DNS, the strattd state backend, and declared job targets.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "stratt.fullname" . }}-ee-jobs
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - {key: stratt.dev/run-id, operator: Exists}
  policyTypes: [Ingress, Egress]
  ingress: []
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNs }}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
    # The OpenTofu HTTP state backend on strattd (ADR-0016) — Jobs authenticate
    # with per-workspace HMAC creds, not a Principal, but still need to reach it.
    - to:
        - podSelector:
            matchLabels: {{- include "stratt.selectorLabels" . | nindent 14 }}
      ports:
        - {protocol: TCP, port: 8080}
    {{- range $np.extraJobEgress }}
    - to:
        - ipBlock:
            cidr: {{ .cidr }}
      {{- with .ports }}
      ports: {{- toYaml . | nindent 8 }}
      {{- end }}
    {{- end }}
{{- end }}
