{{- if .Values.substrate.inCluster.enabled }}
{{- $fullname := include "stratt.fullname" . }}
{{- $s := .Values.substrate.inCluster }}
{{- /*
  In-cluster DEV substrate (opt-in — default stays bring-your-own, ADR-0013 / §1.4).
  Thin, ephemeral Postgres / NATS / Temporal so "nothing -> Stratt in kube" is a single
  `helm install` with no compose stack (the self-contained profile the networkPolicy notes
  reference). Uses blessed upstream images directly — NO third-party Helm chart dependency,
  so no Bitnami-style relicensing exposure (§1.3/§1.7). DEV ONLY: emptyDir storage, inline
  dev creds, a standalone in-memory Temporal dev server. Production keeps substrate external.
*/}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-postgres
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: {{ $fullname }}-postgres }
  template:
    metadata:
      labels: { app: {{ $fullname }}-postgres }
    spec:
      containers:
        - name: postgres
          image: {{ $s.postgres.image | quote }}
          env:
            - { name: POSTGRES_USER, value: {{ $s.postgres.user | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ $s.postgres.password | quote }} }
            - { name: POSTGRES_DB, value: {{ $s.postgres.db | quote }} }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports:
            - { name: postgres, containerPort: 5432 }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", {{ $s.postgres.user | quote }}, "-d", {{ $s.postgres.db | quote }}] }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources: {{- toYaml $s.resources | nindent 12 }}
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
      volumes:
        - { name: data, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-postgres
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  selector: { app: {{ $fullname }}-postgres }
  ports:
    - { name: postgres, port: 5432, targetPort: postgres }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-nats
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: {{ $fullname }}-nats }
  template:
    metadata:
      labels: { app: {{ $fullname }}-nats }
    spec:
      containers:
        - name: nats
          image: {{ $s.nats.image | quote }}
          args: ["-js", "-m", "8222"] # JetStream on; monitoring endpoint for the readiness probe
          ports:
            - { name: client, containerPort: 4222 }
            - { name: monitor, containerPort: 8222 }
          readinessProbe:
            httpGet: { path: /healthz, port: monitor }
            initialDelaySeconds: 2
            periodSeconds: 5
          resources: {{- toYaml $s.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-nats
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  selector: { app: {{ $fullname }}-nats }
  ports:
    - { name: client, port: 4222, targetPort: client }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-temporal
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: {{ $fullname }}-temporal }
  template:
    metadata:
      labels: { app: {{ $fullname }}-temporal }
    spec:
      containers:
        - name: temporal
          image: {{ $s.temporal.image | quote }}
          # Standalone dev server (in-memory, no external DB) — DEV ONLY. Registers
          # the default namespace on start; strattd dials :7233 (temporal.address).
          command: ["temporal", "server", "start-dev", "--ip", "0.0.0.0", "--namespace", {{ $s.temporal.namespace | quote }}, "--log-level", "warn"]
          ports:
            - { name: grpc, containerPort: 7233 }
            - { name: ui, containerPort: 8233 }
          readinessProbe:
            tcpSocket: { port: grpc }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources: {{- toYaml $s.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullname }}-temporal
  labels: {{- include "stratt.labels" . | nindent 4 }}
spec:
  selector: { app: {{ $fullname }}-temporal }
  ports:
    - { name: grpc, port: 7233, targetPort: grpc }
{{- end }}
