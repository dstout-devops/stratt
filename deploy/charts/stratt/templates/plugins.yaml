{{- /*
gRPC plugins deployed in-cluster (ADR-0046). Each `.Values.plugins` entry renders a
Deployment + Service serving the sovereign plugin port on :9090; strattd dials it via
the STRATT_<NAME>_PLUGIN_ADDR env wired in deployment.yaml. A plugin that brokers
Secrets (SecretBroker, §2.5) sets `secretNamespace` to get a CONFINED get-Secrets Role
scoped to exactly that namespace — never cluster-wide (the notify MF-A pattern).
*/ -}}
{{- range .Values.plugins }}
{{- $name := printf "%s-%s" (include "stratt.fullname" $) .name }}
{{- /* Plugin pods carry their OWN identity labels — NEVER strattd's selectorLabels,
       or the strattd Deployment/Service (which select app.kubernetes.io/name=<chart>)
       would adopt the plugin pod and route API traffic to it.
       NOTE: this comment closes with `}}` (NOT `-}}`) on purpose — the trailing
       newline is the ONLY separator keeping the leading `---` on its own line when
       a PRIOR plugin iteration precedes it (else `targetPort: 9090---` glues two
       documents and the second plugin's Service silently vanishes). */}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: plugin
    app.kubernetes.io/managed-by: {{ $.Release.Service }}
    stratt.dev/plugin: {{ .name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .name }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      stratt.dev/plugin: {{ .name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .name }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        app.kubernetes.io/component: plugin
        stratt.dev/plugin: {{ .name }}
    spec:
      {{- if or .secretNamespace .kubeAccess }}
      serviceAccountName: {{ $name }}
      {{- end }}
      securityContext: {{- toYaml $.Values.podSecurityContext | nindent 8 }}
      containers:
        - name: plugin
          image: {{ include "stratt.image" .image }}
          imagePullPolicy: {{ .image.pullPolicy | default "IfNotPresent" }}
          securityContext: {{- toYaml $.Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: 9090
          env:
            - name: STRATT_PLUGIN_LISTEN
              value: ":9090"
            {{- if .secretNamespace }}
            - name: STRATT_SECRET_NAMESPACE
              value: {{ .secretNamespace | quote }}
            {{- end }}
            {{- range $k, $v := .env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources: {{- toYaml ($.Values.pluginResources | default $.Values.resources) | nindent 12 }}
          {{- /* estateHosts: a file-backed Syncer (declared-estate, ADR-0056 §5)
                 needs the estate's hosts/ files. Mount ONLY those keys from the
                 inline declarations ConfigMap (least privilege — not the whole
                 estate) at /hosts. Dev/inline path; prod delivers via git-sync. */ -}}
          {{- if or .estateHosts .tmpDir .demoChart }}
          volumeMounts:
            {{- if .estateHosts }}
            - name: estate-hosts
              mountPath: /hosts
              readOnly: true
            {{- end }}
            {{- if .tmpDir }}
            # Writable scratch for a plugin with a read-only rootfs that needs /tmp —
            # the helm Actuator's cache/config + rendered values (ADR-0092 / §7.3).
            - name: tmp
              mountPath: /tmp
            {{- end }}
            {{- if .demoChart }}
            # The M2 self-deploy demo chart, mounted at the helm Actuator's chart root
            # (STRATT_HELM_CHART_ROOT=/charts → chart "hello" resolves to /charts/hello).
            - name: demo-chart
              mountPath: /charts/hello
              readOnly: true
            {{- end }}
            {{- if .openfgaChart }}
            # The OpenFGA-memory self-deploy chart (ADR-0102), mounted so chart
            # "openfga-memory" resolves to /charts/openfga-memory.
            - name: openfga-chart
              mountPath: /charts/openfga-memory
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .estateHosts .tmpDir .demoChart .openfgaChart }}
      volumes:
        {{- if .estateHosts }}
        - name: estate-hosts
          configMap:
            name: {{ include "stratt.fullname" $ }}-declarations
            items:
              {{- range $path, $bytes := $.Files.Glob "dev/declarations/hosts/**" }}
              - key: {{ trimPrefix "dev/declarations/" $path | replace "/" "__" }}
                path: {{ trimPrefix "dev/declarations/hosts/" $path }}
              {{- end }}
        {{- end }}
        {{- if .tmpDir }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if .demoChart }}
        - name: demo-chart
          configMap:
            name: {{ include "stratt.fullname" $ }}-hello-chart
            items:
              {{- range $path, $bytes := $.Files.Glob "files/hello/**" }}
              - key: {{ trimPrefix "files/hello/" $path | replace "/" "__" }}
                path: {{ trimPrefix "files/hello/" $path }}
              {{- end }}
        {{- end }}
        {{- if .openfgaChart }}
        - name: openfga-chart
          configMap:
            name: {{ include "stratt.fullname" $ }}-openfga-chart
            items:
              {{- range $path, $bytes := $.Files.Glob "files/openfga-memory/**" }}
              - key: {{ trimPrefix "files/openfga-memory/" $path | replace "/" "__" }}
                path: {{ trimPrefix "files/openfga-memory/" $path }}
              {{- end }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    app.kubernetes.io/component: plugin
    stratt.dev/plugin: {{ .name }}
spec:
  selector:
    app.kubernetes.io/name: {{ .name }}
    app.kubernetes.io/instance: {{ $.Release.Name }}
    stratt.dev/plugin: {{ .name }}
  ports:
    - name: grpc
      port: 9090
      targetPort: 9090
{{- if or .secretNamespace .kubeAccess }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $name }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
{{- end }}
{{- if .secretNamespace }}
---
# Confined to the brokerable-Secret namespace only (§2.5, notify MF-A) — never a
# cluster-wide secrets reader. The RBAC gate ≈ the per-call use-grant the core
# already enforced.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-secret-reader
  namespace: {{ .secretNamespace }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-secret-reader
  namespace: {{ .secretNamespace }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-secret-reader
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- if .deployNamespace }}
---
# The single self-deploy target namespace, created by the chart (at the operator's
# install privilege) so the namespaced Role below has a namespace to bind into and the
# self-deploy plugin itself needs NO namespace-create grant (ADR-0102 Q3, least authority).
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .deployNamespace }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
{{- end }}
{{- if and .kubeAccess .deployNamespace }}
---
# CONFINED to a SINGLE namespace (§2.5, ADR-0092 required model): the self-deploy helm
# Actuator materializes releases into exactly one pre-created namespace, so its kube-API
# grant is a namespaced Role there — NOT a cluster-wide reader/writer. This is the sharp
# alternative to the ClusterRole below: no cluster-wide `secrets` reach, no access to any
# other namespace's brokerable Secrets. The target namespace is pre-created out-of-band
# (the SA holds NO namespace-create). charter-guardian ADR-0102 Q3.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $name }}-kube-access
  namespace: {{ .deployNamespace }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
rules:
  - apiGroups: {{ .kubeAccess.apiGroups | toJson }}
    resources: {{ .kubeAccess.resources | toJson }}
    verbs: {{ .kubeAccess.verbs | default (list "get" "list" "watch") | toJson }}
  {{- if .kubeAccessRead }}
  # Separate READ-ONLY rule (least authority) — e.g. helm --wait watching Pods/ReplicaSets.
  - apiGroups: {{ .kubeAccessRead.apiGroups | toJson }}
    resources: {{ .kubeAccessRead.resources | toJson }}
    verbs: {{ .kubeAccessRead.verbs | default (list "get" "list" "watch") | toJson }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $name }}-kube-access
  namespace: {{ .deployNamespace }}
  labels: {{- include "stratt.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $name }}-kube-access
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $.Release.Namespace }}
{{- else if .kubeAccess }}
---
# CONFINED kube-API access to exactly the resources this plugin uses (§2.5): a plugin over
# the kube API — a Syncer OBSERVING (e.g. Crossplane listing its Claim CRs) and/or a builder
# APPLYING (Crossplane server-side-applying provider resources). Scoped to the declared
# apiGroups/resources + verbs (default get/list/watch — a read-only Syncer); never a
# cluster-admin. Cluster-wide because a Syncer's Observe spans namespaces; for a
# single-namespace self-deploy target, prefer `deployNamespace` (a namespaced Role) above.
# The RBAC gate ≈ the per-verb grant the core already governs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $name }}-kube-access
  labels: {{- include "stratt.labels" $ | nindent 4 }}
rules:
  - apiGroups: {{ .kubeAccess.apiGroups | toJson }}
    resources: {{ .kubeAccess.resources | toJson }}
    verbs: {{ .kubeAccess.verbs | default (list "get" "list" "watch") | toJson }}
  {{- if .kubeAccessRead }}
  # Separate READ-ONLY rule (least authority) — e.g. helm --wait watching Pods/ReplicaSets.
  - apiGroups: {{ .kubeAccessRead.apiGroups | toJson }}
    resources: {{ .kubeAccessRead.resources | toJson }}
    verbs: {{ .kubeAccessRead.verbs | default (list "get" "list" "watch") | toJson }}
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $name }}-kube-access
  labels: {{- include "stratt.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $name }}-kube-access
subjects:
  - kind: ServiceAccount
    name: {{ $name }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
