# Plugin-e2e values — layered AFTER values-dev-kind.yaml (task dev:install).
# Proves BOTH plugin transports in-cluster: the vcenter gRPC Syncer plugin (a
# `plugins:` entry) projecting real vcsim Entities, and the script/ansible EE-Job
# Actuators (dispatched as K8s Jobs). Everything dev-shaped; never derive prod
# values from this file.
#
# The host-gateway (192.168.102.1 default from deploy/dev/kind.yaml's pinned
# subnet) is re-asserted at install by `task dev:install` via --set-string with
# the value computed from `docker network inspect kind`, so a foreign subnet
# can't silently break the substrate/vcsim DSNs.

# In-proc tuple evaluator (no OpenFGA server / DSN secret) — the authz for the
# e2e is delivered by the inline declarations below.
openfga:
  enabled: false

devPrincipalHeader: true

# Active environment (ADR-0057): reconcile the DEV slice of the estate. The
# estate's four production-slice Triggers (cert-reconcile-web, the two ansible
# collectors, salt-minion-start) are tagged `environments: [prod]`, so this
# daemon never launches them (and, data-layer-scoped, never prunes them) — no
# cross-env schedule noise. The plugin-e2e fixtures are untagged ⇒ in every env.
environment: dev

# Inline CaC checkout (chart-rendered ConfigMap): the whole reconciled /estate,
# staged into dev/declarations/** by `task dev:stage-estate`. Carries the
# dev-hosts / dev-vms plugin-e2e Views + the dev-runner `runner` grants.
declarations:
  gitSync:
    enabled: false
  inline:
    enabled: true
    interval: "10s" # tighten the reconcile so the e2e's Views/tuples go live fast
    # This inline set IS the authoritative dev desired state; allow it to prune
    # stale cac accumulated on a shared/dirty dev graph (past the 0.5 default).
    maxPruneFraction: "1"

# The Syncer plugins, deployed in-cluster and dialed by strattd.
plugins:
  # Declared estate (devices-as-code, ADR-0056 §5): projects estate/hosts/*.yaml
  # as `host` Entities. `estateHosts: true` mounts just the hosts/ keys from the
  # declarations ConfigMap at /hosts. hostEnv wires strattd's syncer for it
  # (STRATT_DECLARED_PLUGIN_ADDR is auto-derived from the name).
  - name: declared
    image:
      repository: stratt-plugin-declared
      tag: dev
      digest: ""
      pullPolicy: Never # kind-loaded (task image:declared-plugin)
    estateHosts: true
    env:
      STRATT_DECLARED_PATH: /hosts
    hostEnv:
      STRATT_DECLARED_SOURCE_NAME: declared-dev
      STRATT_DECLARED_INTERVAL: "15s"
  - name: vcenter
    image:
      repository: stratt-plugin-vcenter
      tag: dev
      digest: ""
      pullPolicy: Never # kind-loaded (task image:vcenter-plugin)
    # env for the PLUGIN pod — it connects to vcsim on the host gateway.
    env:
      STRATT_VCENTER_URL: "https://192.168.102.1:8989/sdk"
      STRATT_VCENTER_INSECURE: "true"
    # extra env injected into strattd: the Source name it homes the projection
    # under (+ the Endpoint metadata stamped on the Source, §2.2).
    hostEnv:
      STRATT_VCENTER_SOURCE_NAME: "vcenter-dev"
      STRATT_VCENTER_URL: "https://192.168.102.1:8989/sdk"
      STRATT_VCENTER_INTERVAL: "15s"
  # awsec2 build Action (ADR-0058 slice 2): the create-vm builder the compute-build
  # Workflow launches. Deployed ACTION-ONLY — hostEnv omits STRATT_AWS_INTERVAL, so
  # strattd runs the Action without the competing instance Syncer (decision-6
  # kind-unification). The plugin pod reaches moto on the host gateway; strattd
  # dials it via the auto-derived STRATT_AWS_PLUGIN_ADDR (name `aws`). The
  # endpoint's gateway IP is re-asserted at install (dev:install --set-string).
  - name: aws
    image:
      repository: stratt-plugin-awsec2
      tag: dev
      digest: ""
      pullPolicy: Never # kind-loaded (task image:awsec2-plugin)
    env:
      STRATT_AWSEC2_ENDPOINT: "http://192.168.102.1:4566" # floci real-host EC2 on the host gateway (ADR-0093)
      STRATT_AWSEC2_REGION: "us-east-1"
      # Dummy static creds: moto accepts ANY credentials, but the AWS SDK's
      # LoadDefaultConfig must resolve SOME (else it probes IMDS and times out).
      AWS_ACCESS_KEY_ID: "testing"
      AWS_SECRET_ACCESS_KEY: "testing"
    hostEnv:
      STRATT_AWS_SOURCE_NAME: "awsec2-build"
      # STRATT_AWS_INTERVAL deliberately unset → build Action only, no Syncer.
  # Crossplane Syncer (ADR-0059/0060): OBSERVES SubnetClaim CRs (deploy/dev/crossplane-
  # subnetclaims.yaml) as a registered network Source — so Crossplane and vSphere manage
  # network in ONE estate, each subnet retained per-source. kubeReader grants CONFINED
  # get/list/watch on just subnetclaims (§2.5), never a cluster reader. No Crossplane
  # controllers needed for the Observe demo — the CRs stand in for cloud subnets.
  - name: crossplane
    image:
      repository: stratt-plugin-crossplane
      tag: dev
      digest: ""
      pullPolicy: Never # kind-loaded (task image:crossplane-plugin)
    # The plugin BUILDS (create-subnet Action server-side-applies provider-kubernetes
    # Objects) AND OBSERVES (lists them for net.subnet) — CONFINED to objects only (§2.5).
    kubeAccess:
      apiGroups: ["kubernetes.crossplane.io"]
      resources: ["objects"]
      verbs: ["get", "list", "watch", "create", "update", "patch"]
    env:
      STRATT_CROSSPLANE_OBSERVE: '[{"group":"kubernetes.crossplane.io","version":"v1alpha2","resource":"objects","projectKind":"subnet","identityScheme":"crossplane.claim"}]'
    hostEnv:
      STRATT_CROSSPLANE_SOURCE_NAME: "crossplane-dev"
      STRATT_CROSSPLANE_INTERVAL: "15s"
