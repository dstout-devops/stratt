apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    stratt.dev/deployed-by: helm-actuator
spec:
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
  ports:
    # strattd promotes its authz backend to http://<release>.<ns>.svc:8080 (the REST API).
    - { name: http, port: 8080, targetPort: http }
    - { name: grpc, port: 8081, targetPort: grpc }
