apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-hello
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    stratt.dev/deployed-by: helm-actuator
data:
  message: {{ .Values.message | default "deployed by the Stratt helm Actuator (M2)" | quote }}
  release: {{ .Release.Name | quote }}
  namespace: {{ .Release.Namespace | quote }}
