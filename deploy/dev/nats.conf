# NATS server config for the Phase-0 dev substrate.
#
# max_payload is raised to match the dispatcher's 8 MiB event-line buffer
# (dispatch.followLogs): a gather-facts runner event for a fact-rich target
# can exceed the 1 MiB default. Oversized-fact offload to the object store
# (charter §3: facts/artifacts → S3) is the Phase-1 follow-up.
port: 4222
http: 8222
max_payload: 8MB

jetstream {
    store_dir: /data
}
