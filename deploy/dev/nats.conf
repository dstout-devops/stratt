# NATS server config for the Phase-0 dev substrate.
#
# max_payload is raised to match the dispatcher's 8 MiB event-line buffer
# (dispatch.followLogs): a gather-facts runner event for a fact-rich target
# can exceed the 1 MiB default. Oversized-fact offload to the object store
# (charter §3: facts/artifacts → S3) is the Phase-1 follow-up.
port: 4222
http: 8222
max_payload: 8MB

jetstream {
    store_dir: /data
}

# Leaf-node listener for remote Sites (charter §3 "leaf-node Sites"; ADR-0032).
# A Site's stratt-agent connects its own NATS server here as a leaf; the hub
# owns JetStream, so the Site (which runs no local JetStream) borrows this
# account — its stratt.run.> events land directly in STRATT_RUN_EVENTS, and it
# consumes STRATT_DISPATCH the same way. Dev-open (no leaf auth); production
# pins per-Site NATS credentials.
leafnodes {
    port: 7422
}
