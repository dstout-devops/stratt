# stratt-adopt plugin deployment (ADR-0088) — the adopt/materialize Action over the
# sovereign port. The control plane dials it (STRATT_ADOPT_PLUGIN_ADDR). It is CORE-OWNED
# (its Invoke runs the core awximport transform), built from core/go.mod, but deployed the
# same way as any port plugin.
#
# MF-A (the guardian §2.5 pattern, shared with notify): the plugin's Secret-read RBAC is
# confined to ONLY its brokerable Secrets — the stratt-secrets namespace holding the AWX
# token Secret — and a Role that grants get on Secrets THERE and nowhere else. So the RBAC
# gate ≈ the per-call use-grant the core already enforced: a compromised adopt plugin can
# read no Secret outside this namespace, and the credential `use`-check remains the sole
# chokepoint. AWX material is resolved here (in-pod), never in strattd (§2.5).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: stratt-adopt
  namespace: stratt
---
# The Role lives in the SECRET namespace, NOT the plugin's — it scopes the plugin's read to
# exactly the brokerable AWX Secret (MF-A). Never a cluster-wide secrets Role.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: stratt-adopt-secret-reader
  namespace: stratt-secrets
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: stratt-adopt-secret-reader
  namespace: stratt-secrets
subjects:
  - kind: ServiceAccount
    name: stratt-adopt
    namespace: stratt
roleRef:
  kind: Role
  name: stratt-adopt-secret-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: stratt-adopt
  namespace: stratt
  labels: { app: stratt-adopt }
spec:
  replicas: 1
  selector: { matchLabels: { app: stratt-adopt } }
  template:
    metadata:
      labels: { app: stratt-adopt }
    spec:
      serviceAccountName: stratt-adopt
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: stratt-adopt
          image: stratt-adopt:dev
          args: []
          ports:
            - { name: grpc, containerPort: 9090 }
          env:
            # The namespace the brokerable AWX token Secret lives in (matches the Role above).
            - { name: STRATT_SECRET_NAMESPACE, value: "stratt-secrets" }
            - { name: STRATT_PLUGIN_LISTEN, value: ":9090" }
            - { name: STRATT_PLUGIN_ID, value: "adopt" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: stratt-adopt
  namespace: stratt
spec:
  selector: { app: stratt-adopt }
  ports:
    - { name: grpc, port: 9090, targetPort: 9090 }
# The control plane then dials it: STRATT_ADOPT_PLUGIN_ADDR=stratt-adopt.stratt.svc:9090
