# managed-web — a REAL sshd + nginx node for the ADR-0084 convergence demo. The
# web-server-configure remediation SSHes in (as root, with the web-machine key) and
# converges the nginx listen port, then reads it back. This is a throwaway dev
# fixture: root SSH with a key-only login, an ephemeral pod. The declared-estate host
# managed-web-1 carries mgmt.address = managed-web.stratt.svc.cluster.local (this
# Service), so the shim renders it as ansible_host.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: managed-web
  namespace: stratt
  labels: { app: managed-web }
spec:
  replicas: 1
  selector:
    matchLabels: { app: managed-web }
  template:
    metadata:
      labels: { app: managed-web }
    spec:
      containers:
        - name: node
          image: nginx:alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache openssh python3 >/dev/null 2>&1
              ssh-keygen -A
              mkdir -p /root/.ssh
              cp /authorized_keys/authorized_keys /root/.ssh/authorized_keys
              chmod 700 /root/.ssh && chmod 600 /root/.ssh/authorized_keys
              sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
              mkdir -p /etc/nginx/conf.d
              nginx
              exec /usr/sbin/sshd -D -e
          ports:
            - { containerPort: 22, name: ssh }
            - { containerPort: 80, name: http }
          volumeMounts:
            - { name: authkeys, mountPath: /authorized_keys, readOnly: true }
      volumes:
        - name: authkeys
          secret: { secretName: managed-web-authorized-keys }
---
apiVersion: v1
kind: Service
metadata:
  name: managed-web
  namespace: stratt
spec:
  selector: { app: managed-web }
  ports:
    - { name: ssh, port: 22, targetPort: 22 }
    - { name: http, port: 80, targetPort: 80 }
