# NATS config for a remote Site (charter §3 "leaf-node Sites"; ADR-0032).
#
# This server runs NO local JetStream: as a leaf of the hub it borrows the hub's
# JetStream account, so the Site's stratt-agent publishes stratt.run.> events
# that land directly in the hub's STRATT_RUN_EVENTS stream and consumes
# STRATT_DISPATCH work items — the "leaf just forwards" topology. The moment a
# Site runs its own JetStream domain this stops auto-forwarding (documented
# ADR-0032 limitation; the prod-correct fix is site-local JS + stream sourcing).
port: 4222
http: 8222
max_payload: 8MB

leafnodes {
    remotes = [
        { url: "nats-leaf://nats:7422" }
    ]
}
