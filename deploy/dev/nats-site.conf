# NATS config for a remote Site (charter §3 "leaf-node Sites"; ADR-0032).
#
# This server runs NO local JetStream: as a leaf of the hub it borrows the hub's
# JetStream account, so the Site's stratt-agent publishes its run events that
# land directly in the hub's Run-event stream and consumes its dispatch work
# items — the "leaf just forwards" topology. The leaf forwards the whole account
# subject-agnostically, so a named Cell's scoped subjects (stratt.<cell>.run.>,
# stratt.<cell>.dispatch.*; ADR-0044 slice 6) forward with no config change —
# the agent and hub only need the SAME STRATT_CELL_ID. This dev leaf is the
# single-Cell "local" case: subjects stay stratt.run.> / STRATT_RUN_EVENTS. The
# moment a Site runs its own JetStream domain this stops auto-forwarding
# (documented ADR-0032 limitation; the prod-correct fix is site-local JS +
# stream sourcing).
port: 4222
http: 8222
max_payload: 8MB

leafnodes {
    remotes = [
        { url: "nats-leaf://nats:7422" }
    ]
}
