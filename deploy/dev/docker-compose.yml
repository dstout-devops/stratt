# Stratt Phase-0 dev substrate (charter §3, §8) — runs inside the devcontainer's
# docker-in-docker. This is the development harness, not a deployment artifact;
# production manifests (Helm, Phase 1) will pin image digests per §7.3. Tags here
# are still pinned exactly and ride the quarterly upgrade train (§1.7).
#
#   task dev:up / task dev:down
#
# Services:
#   postgres  — the graph plane (charter §3: Postgres 18, JSONB, GIN)
#   nats      — JetStream: run event streaming, Emitter ingestion (§3)
#   temporal  — orchestration plane, auto-setup against the same Postgres (§3)
#   vcsim     — govmomi's vCenter simulator: the Phase-0 Syncer's dev target (§8)
#   openfga   — authorization plane (§2.5, ADR-0009): memory engine in dev —
#               tuples are CaC and re-synced every reconcile, so the server is
#               a rebuildable projection of Git (production: postgres engine +
#               `openfga migrate`, Helm slice)
#   zitadel   — dev OIDC issuer (ADR-0009 slice 5); AGPL — unmodified network
#               service only, never vendored/forked (the Ansible-subprocess
#               analogy; see the ADR-0009 implementation notes)

name: stratt-dev

# Explicit subnet: the devcontainer's docker-in-docker daemon has a small
# default address pool (see .devcontainer/devcontainer.json); a manual subnet
# sidesteps pool exhaustion regardless of that setting.
networks:
  default:
    ipam:
      config:
        - subnet: 192.168.101.0/24

services:
  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: stratt
      POSTGRES_PASSWORD: stratt-dev # dev-only; real deployments broker via CredentialRef (§2.5)
      POSTGRES_DB: stratt
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratt -d stratt"]
      interval: 3s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.12.2-alpine
    # Config file rather than flags: max_payload has no CLI flag.
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring
    volumes:
      - natsdata:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 20

  # A remote Site's NATS server (ADR-0032): a leaf of `nats`, no local
  # JetStream. The stratt-agent connects here; its stratt.run.> events and
  # STRATT_DISPATCH consumption ride the leaf into the hub's JetStream.
  nats-site:
    image: nats:2.12.2-alpine
    command: ["-c", "/etc/nats/nats-site.conf"]
    ports:
      - "4223:4222" # client (host-side debug)
      - "8223:8222" # monitoring
    volumes:
      - ./nats-site.conf:/etc/nats/nats-site.conf:ro
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 20

  # OCI registry for pull-mode Bundles (ADR-0032; dependency-scout: zot, the
  # OCI-artifact-native CNCF registry). Dev: anonymous read/write, plain HTTP.
  # Production pins the image by digest (§7.3) and enables auth.
  zot:
    image: ghcr.io/project-zot/zot-linux-amd64:v2.1.18
    command: ["serve", "/etc/zot/config.json"]
    ports:
      - "5555:5000"
    volumes:
      - ./zot.json:/etc/zot/config.json:ro
      - zotdata:/var/lib/registry
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5000/v2/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.29.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: stratt
      POSTGRES_PWD: stratt-dev
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      # auto-setup >= 1.28 no longer bundles this file; mount our own.
      - ./temporal-dynamicconfig.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    ports:
      - "7233:7233"
    healthcheck:
      # auto-setup binds the frontend to the container IP, not loopback.
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233"]
      interval: 5s
      timeout: 5s
      retries: 30

  vcsim:
    image: vmware/vcsim:v0.55.1 # version-locked to the pinned govmomi module (ADR: dependency-scout 2026-07-11)
    # Args only — the image ENTRYPOINT is already /vcsim, and a repeated
    # binary name becomes a positional arg that stops Go flag parsing (all
    # flags silently ignored, default loopback bind). 0.0.0.0 so the mapped
    # port reaches it; 25 VMs per RP: a small estate to project.
    command: ["-l", "0.0.0.0:8989", "-vm", "25"]
    ports:
      - "8989:8989"
    # No healthcheck: the vcsim image is distroless (no shell/wget to probe
    # with). The Syncer's own connect/retry loop is the effective readiness
    # signal in dev.

  floci:
    # REAL-host EC2 dev backend (ADR-0093), replacing the moto MOCK. Floci runs real
    # Docker containers as EC2 instances (SSH-able, cloud-init/IMDS, real lifecycle),
    # serving the AWS API on :4566. floci-io/floci, MIT (dependency-scout 2026-07-22;
    # LocalStack rug-pulled its free tier, moto is a mock — neither gives real hosts).
    # It needs the Docker socket to launch instance containers (dind siblings). Pin;
    # pin by DIGEST in CI (§1.7). moto retired (may return for mock-OK non-EC2 svcs).
    image: floci/floci:1.5.33
    ports:
      - "4566:4566"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:4566/_localstack/health 2>/dev/null || wget -q -O /dev/null http://127.0.0.1:4566/ || exit 1",
        ]
      interval: 3s
      timeout: 3s
      retries: 30

  seaweedfs:
    # S3-compatible object store for the Evidence store (charter §2.4, ADR-0029).
    # dependency-scout 2026-07-13: SeaweedFS (Apache-2.0) over Garage (AGPL + no
    # object-lock) and moto (store-and-ignore lock). IMPORTANT (ADR-0029, verified
    # empirically): SeaweedFS accepts the object-lock config + retention but does
    # NOT enforce WORM (3.97 and 4.39 both allow overwrite AND delete under
    # retention). So in dev, Evidence immutability rests on sha256 tamper-evidence
    # (a mutated object is detected + refused on read) + write-once — NOT backend
    # WORM. Real WORM enforcement needs a compliant production store (AWS S3
    # Object Lock). This dev container proves the S3 path + tamper-evidence, not
    # storage-layer immutability.
    image: chrislusf/seaweedfs:4.40
    # All-in-one (master+volume+filer+s3); path-style S3 on 8333. -ip.bind=0.0.0.0
    # so the mapped port reaches it from strattd on the host. -s3.config declares an
    # admin identity (testing/testing — the AWS_ACCESS_KEY_ID the Evidence store +
    # the awss3 Connector, ADR-0097, sign with): SeaweedFS 4.x rejects SIGNED requests
    # with an unknown key even when auth is nominally off, and the AWS SDK always signs.
    command:
      [
        "server",
        "-dir=/data",
        "-s3",
        "-s3.port=8333",
        "-s3.config=/etc/seaweedfs/s3.json",
        "-ip.bind=0.0.0.0",
        "-master.volumeSizeLimitMB=100",
      ]
    ports:
      - "8333:8333"
    volumes:
      - seaweeddata:/data
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8333/ || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20

  openbao:
    # Dev CLM / certificate authority for Intent/Certificate GA (charter §2.4,
    # §8 "certificate lifecycle as first tenant"; ADR-0030). OpenBao is the
    # Linux-Foundation, MPL-2.0 fork of Vault's PKI secrets engine — Vault minus
    # the BUSL-1.1 relicense that charter §1.3 ("rug-pull-proof") exists to avoid.
    # dependency-scout 2026-07-13: HashiCorp Vault REJECTED for bundling (BUSL,
    # the canonical §1.3 rug-pull; admissible only as a user-supplied external
    # Connector); OpenBao chosen over step-ca because it doubles as the future
    # CredentialRef broker. The cert-issuer Connector contract is issuer-agnostic
    # (§1.5) — OpenBao is the dev transport, never load-bearing.
    #
    # Dev mode: in-memory, auto-unsealed, single root token; the PKI engine +
    # root CA + role + demo leaf certs are provisioned by openbao-bootstrap.sh
    # (task dev:openbao:bootstrap), the way zitadel-bootstrap.sh seeds Zitadel.
    image: openbao/openbao:2.5.5
    cap_add:
      - IPC_LOCK # bao mlock; harmless in dev, silences the startup warning
    environment:
      BAO_DEV_ROOT_TOKEN_ID: stratt-dev-root # dev-only; real deployments broker via CredentialRef (§2.5)
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: ["server", "-dev"]
    ports:
      - "8200:8200"
    healthcheck:
      # dev mode is unsealed+active immediately; /v1/sys/health returns 200.
      test: ["CMD", "bao", "status", "-address=http://127.0.0.1:8200"]
      interval: 3s
      timeout: 3s
      retries: 20

  openfga:
    image: openfga/openfga:v1.17.0 # dependency-scout 2026-07-11: RECOMMEND (CNCF Incubating)
    command: ["run", "--datastore-engine", "memory"]
    ports:
      - "8081:8080" # HTTP API (gRPC 8081 stays internal)
    healthcheck:
      # grpc_health_probe ships in the image; the gRPC listener is in-container 8081.
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=127.0.0.1:8081"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: zitadel rides the shared Postgres but owns its database; the
  # pgdata volume outlives image init scripts, so creation is an idempotent job.
  zitadel-db-init:
    image: postgres:18.1-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: stratt-dev
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - psql -h postgres -U stratt -d stratt -tc "SELECT 1 FROM pg_database WHERE datname='zitadel'" | grep -q 1 || createdb -h postgres -U stratt zitadel
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.16.0
    user: "0" # writes the bootstrap PAT into the bind mount
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      # dev-only masterkey (must be exactly 32 bytes); real deployments broker via CredentialRef (§2.5)
      ZITADEL_MASTERKEY: stratt-dev-masterkey-0123456789a
      ZITADEL_PORT: 8080
      # env (not only the start flag): the `zitadel ready` healthcheck reads config
      # from env and must probe plain http.
      ZITADEL_TLS_ENABLED: false
      # Issuer identity — must match how strattd reaches it (STRATT_OIDC_ISSUER=http://localhost:8082).
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8082
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://stratt:stratt-dev@postgres:5432/zitadel?sslmode=disable
      # First-instance IAM_OWNER machine user; its PAT lands in the bind mount
      # for zitadel-bootstrap.sh to provision the e2e service identities.
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: stratt-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Stratt dev bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
    volumes:
      - ./.zitadel:/zitadel/bootstrap:rw # gitignored; PAT is dev-instance-local
    ports:
      - "8082:8080"
    depends_on:
      zitadel-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # ── NetBox: the `ipam` capability provider's external SoR (ADR-0111) ──────────
  # NetBox is a community-tier PLUGIN dependency (NEVER Stratt spine, §1.4): the
  # netbox plugin drives its REST API to OBSERVE topology and ALLOCATE prefixes.
  # dependency-scout 2026-07-23: RECOMMEND — Apache-2.0 core; pin the 4.5 line
  # (N-1 4.4); the netbox plugin talks ONLY to the Apache-2.0 core API, never a
  # Polyform-licensed add-on (Diode/Assurance). NetBox's own Postgres + Redis are
  # its PRIVATE substrate, structurally separate from the spine's postgres/nats/
  # temporal (charter-guardian note, ADR-0111). Seeded with the enterprise topology
  # (regions/AZs/tenants/VLANs/prefixes) by netbox-bootstrap.sh — task dev:netbox:bootstrap.
  netbox-postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: netbox-dev # dev-only; real deployments broker via CredentialRef (§2.5)
      POSTGRES_DB: netbox
    volumes:
      - netbox-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox -d netbox"]
      interval: 3s
      timeout: 3s
      retries: 20

  netbox-redis:
    # NetBox's PRIVATE Redis (RQ task queue + cache) — internal plumbing of the
    # driven tool, like Ansible's runtime in the EE pod; never a Stratt spine dep (§1.4).
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  netbox:
    # D6 binding condition (dependency-scout): pinned to the 4.5 line. Verify the
    # image digest (cosign/SLSA/SBOM) before hard-pinning in CI/production (§7.3) —
    # confirm the exact tag/digest on the first `task dev:up` pull.
    image: docker.io/netboxcommunity/netbox:v4.5-3.4.2
    depends_on:
      netbox-postgres:
        condition: service_healthy
      netbox-redis:
        condition: service_healthy
    environment:
      DB_HOST: netbox-postgres
      DB_NAME: netbox
      DB_USER: netbox
      DB_PASSWORD: netbox-dev
      REDIS_HOST: netbox-redis
      REDIS_PORT: "6379"
      REDIS_DATABASE: "0" # RQ task queue
      REDIS_CACHE_HOST: netbox-redis
      REDIS_CACHE_DATABASE: "1" # cache (separate DB — see NetBox docs)
      # dev-only secrets; real deployments broker via CredentialRef (§2.5).
      SECRET_KEY: stratt-dev-netbox-secret-key-0123456789-abcdefghij
      SUPERUSER_NAME: admin
      SUPERUSER_EMAIL: admin@stratt.test
      SUPERUSER_PASSWORD: netbox-dev
      # A KNOWN dev API token so the netbox plugin + netbox-bootstrap.sh authenticate
      # without a login round-trip. dev-only; brokered via CredentialRef in real deployments (§2.5).
      SUPERUSER_API_TOKEN: "0123456789abcdef0123456789abcdef01234567"
      SKIP_STARTUP_SCRIPTS: "true"
      ALLOWED_HOSTS: "*"
    ports:
      - "8083:8080"
    healthcheck:
      # First boot runs DB migrations + superuser creation (~30-60s); the API root
      # answers 200 once ready. curl ships in the netbox image.
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/"]
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 60s

volumes:
  pgdata:
  natsdata:
  seaweeddata:
  zotdata:
  netbox-pgdata:
