# Stratt Phase-0 dev substrate (charter §3, §8) — runs inside the devcontainer's
# docker-in-docker. This is the development harness, not a deployment artifact;
# production manifests (Helm, Phase 1) will pin image digests per §7.3. Tags here
# are still pinned exactly and ride the quarterly upgrade train (§1.7).
#
#   task dev:up / task dev:down
#
# Services:
#   postgres  — the graph plane (charter §3: Postgres 18, JSONB, GIN)
#   nats      — JetStream: run event streaming, Emitter ingestion (§3)
#   temporal  — orchestration plane, auto-setup against the same Postgres (§3)
#   vcsim     — govmomi's vCenter simulator: the Phase-0 Syncer's dev target (§8)
#   openfga   — authorization plane (§2.5, ADR-0009): memory engine in dev —
#               tuples are CaC and re-synced every reconcile, so the server is
#               a rebuildable projection of Git (production: postgres engine +
#               `openfga migrate`, Helm slice)
#   zitadel   — dev OIDC issuer (ADR-0009 slice 5); AGPL — unmodified network
#               service only, never vendored/forked (the Ansible-subprocess
#               analogy; see the ADR-0009 implementation notes)

name: stratt-dev

# Explicit subnet: the devcontainer's docker-in-docker daemon has a small
# default address pool (see .devcontainer/devcontainer.json); a manual subnet
# sidesteps pool exhaustion regardless of that setting.
networks:
  default:
    ipam:
      config:
        - subnet: 192.168.101.0/24

services:
  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: stratt
      POSTGRES_PASSWORD: stratt-dev # dev-only; real deployments broker via CredentialRef (§2.5)
      POSTGRES_DB: stratt
    command: ["postgres", "-c", "shared_buffers=512MB", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratt -d stratt"]
      interval: 3s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.12.2-alpine
    # Config file rather than flags: max_payload has no CLI flag.
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222" # client
      - "8222:8222" # monitoring
    volumes:
      - natsdata:/data
      - ./nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8222/healthz"]
      interval: 3s
      timeout: 3s
      retries: 20

  temporal:
    image: temporalio/auto-setup:1.29.1
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: stratt
      POSTGRES_PWD: stratt-dev
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      # auto-setup >= 1.28 no longer bundles this file; mount our own.
      - ./temporal-dynamicconfig.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml:ro
    ports:
      - "7233:7233"
    healthcheck:
      # auto-setup binds the frontend to the container IP, not loopback.
      test: ["CMD-SHELL", "temporal operator cluster health --address $(hostname -i):7233"]
      interval: 5s
      timeout: 5s
      retries: 30

  vcsim:
    image: vmware/vcsim:v0.55.1 # version-locked to the pinned govmomi module (ADR: dependency-scout 2026-07-11)
    # Args only — the image ENTRYPOINT is already /vcsim, and a repeated
    # binary name becomes a positional arg that stops Go flag parsing (all
    # flags silently ignored, default loopback bind). 0.0.0.0 so the mapped
    # port reaches it; 25 VMs per RP: a small estate to project.
    command: ["-l", "0.0.0.0:8989", "-vm", "25"]
    ports:
      - "8989:8989"
    # No healthcheck: the vcsim image is distroless (no shell/wget to probe
    # with). The Syncer's own connect/retry loop is the effective readiness
    # signal in dev.

  moto:
    # Dev stand-in for the EC2 API (ADR-0014; the vcsim posture). moto over
    # LocalStack: dependency-scout 2026-07-12 — LocalStack's free tier
    # dropped EC2 behind an auth-gated paid plan (March 2026); moto is
    # Apache-2.0, community-governed, actively maintained, and mocks the
    # run/describe/terminate-instances surface the Syncer e2e needs.
    image: motoserver/moto:5.2.2
    ports:
      - "5000:5000"

  openfga:
    image: openfga/openfga:v1.17.0 # dependency-scout 2026-07-11: RECOMMEND (CNCF Incubating)
    command: ["run", "--datastore-engine", "memory"]
    ports:
      - "8081:8080" # HTTP API (gRPC 8081 stays internal)
    healthcheck:
      # grpc_health_probe ships in the image; the gRPC listener is in-container 8081.
      test: ["CMD", "/usr/local/bin/grpc_health_probe", "-addr=127.0.0.1:8081"]
      interval: 3s
      timeout: 3s
      retries: 20

  # One-shot: zitadel rides the shared Postgres but owns its database; the
  # pgdata volume outlives image init scripts, so creation is an idempotent job.
  zitadel-db-init:
    image: postgres:18.1-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: stratt-dev
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - psql -h postgres -U stratt -d stratt -tc "SELECT 1 FROM pg_database WHERE datname='zitadel'" | grep -q 1 || createdb -h postgres -U stratt zitadel
    restart: "no"

  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.16.0
    user: "0" # writes the bootstrap PAT into the bind mount
    command: start-from-init --masterkeyFromEnv --tlsMode disabled
    environment:
      # dev-only masterkey (must be exactly 32 bytes); real deployments broker via CredentialRef (§2.5)
      ZITADEL_MASTERKEY: stratt-dev-masterkey-0123456789a
      ZITADEL_PORT: 8080
      # env (not only the start flag): the `zitadel ready` healthcheck reads config
      # from env and must probe plain http.
      ZITADEL_TLS_ENABLED: false
      # Issuer identity — must match how strattd reaches it (STRATT_OIDC_ISSUER=http://localhost:8082).
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_EXTERNALPORT: 8082
      ZITADEL_EXTERNALSECURE: false
      ZITADEL_DATABASE_POSTGRES_DSN: postgresql://stratt:stratt-dev@postgres:5432/zitadel?sslmode=disable
      # First-instance IAM_OWNER machine user; its PAT lands in the bind mount
      # for zitadel-bootstrap.sh to provision the e2e service identities.
      ZITADEL_FIRSTINSTANCE_PATPATH: /zitadel/bootstrap/admin.pat
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: stratt-bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Stratt dev bootstrap
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
    volumes:
      - ./.zitadel:/zitadel/bootstrap:rw # gitignored; PAT is dev-instance-local
    ports:
      - "8082:8080"
    depends_on:
      zitadel-db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

volumes:
  pgdata:
  natsdata:
