# Patch/advisory ruleset (ADR-0080 slice 2): compliance-as-data. WHO decides
# "vulnerable" is declared here in Git and loaded on the reconcile cadence — never
# hardcoded — and checked against the software.package inventory a collector
# projects onto each host (slice 2b). An affected package raises a patch/advisory
# Finding whose remediation is a package upgrade at the host SoR (never a graph edit).
#
# An advisory affects an installed package when its version is below `fixed`
# (upgrade-to-fix) OR appears in `affected` (explicit). A version the comparator
# cannot rank (epoch/tilde) surfaces an `unassessable` Finding — never silent-safe.
advisories:
  - id: CVE-2022-3602
    package: openssl
    title: "X.509 email address 4-byte buffer overflow (punycode)"
    fixed: "3.0.7"
    severity: high

  - id: CVE-2023-38545
    package: curl
    title: "SOCKS5 heap buffer overflow"
    fixed: "8.4.0"
    severity: high

  - id: DSA-EOL-openssl1
    package: openssl
    title: "OpenSSL 1.x is end-of-life — no security fixes"
    affected: ["1.0.2", "1.1.0", "1.1.1"]
    severity: critical
