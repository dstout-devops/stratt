# linux-baseline Blueprint — "template Z" (an L2 construct with sane defaults,
# ADR-0055). It composes an Intent/FileSet into a facet-observation Baseline: the
# compiler substitutes {{.spec.*}} from the bound Intent and fans out one drift
# check per linux-fleet member. `claim: additive` (§2.4 anti-GPO) — this baseline
# contributes the sshd-config key to a host's fileset.content Facet and unions with
# other FileSet Intents rather than fighting them. Remediation is a Workflow REF,
# never auto-launched (§5 Flow 2) — the operator applies it from the drift Finding.
name: linux-baseline
version: 1
for: Intent/FileSet
severity: warning
dampingObservations: 1
removeWorkflow: fileset-revert
routes:
  - observe:
      namespace: fileset.content
      path: "{{.spec.key}}.digest"
      equals: "{{.spec.digest}}"
    claim: additive
    remediationWorkflow: fileset-apply
