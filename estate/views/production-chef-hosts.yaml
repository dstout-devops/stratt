# Smart-inventory View over Chef-sourced hosts (ADR-0037): the AAP-inventory →
# Stratt-View replacement. The chef Syncer projects each node as a `host` Entity
# carrying the source-scoped chef.node.* facets; a View selects them live, no
# hand-entered host list (§1.2 — Chef stays the SoR).
#
# Selection is on the SOURCE-scoped facet, not the shared Entity `labels` bag:
# labels are a whole-set last-writer projection that would clobber across two
# config-mgmt Sources correlating onto one host (ADR-0038). Facets are
# per-namespace-owned, so they never clobber.
#
# This is the §1.1 shipping consumer that demands the projection. Bind an
# Assignment to it in a later Intent-layer slice to enforce Baselines over the
# fleet; here it just proves the estate is queryable as one graph.
name: production-chef-hosts
selector:
  kinds: [host]
  facets:
    - namespace: chef.node.identity
      path: environment
      equals: production
