# app-subnet — Intent/Subnet (ADR-0059): declare a desired subnet from the simplest form.
# "A /24 for the app tier" — that's the whole declaration. This is NOT an Entity (§1.2):
# the graph holds only what is BUILT. The provisioning reconcile compares this named
# singleton against the subnet already projected+correlated for it and surfaces a GATED
# build (a provision/app-subnet Finding) — it never auto-launches (§5 Flow 1). Approve the
# buildWorkflow → Crossplane provisions the subnet → it projects back as
# kind: subnet correlated by stratt.intent/singleton → the Finding resolves → the Syncer
# maintains net.subnet as-built.
#
# `builder` is the landscape swap point: crossplane/provision (provider-kubernetes in
# dev) today, one-line change to a real cloud provider (provider-aws Subnet) tomorrow —
# the rest of the estate never moves (§1.4/§1.5).
name: app-subnet
kind: Intent/Subnet
spec:
  projectKind: subnet
  builder: crossplane/provision
  buildWorkflow: subnet-build # the GATED Workflow the operator launches
  params: # OPAQUE — validated against the builder's own input Contract (§1.5)
    cidr: 10.30.0.0/24
