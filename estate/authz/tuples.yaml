# Estate authz (CaC, loaded by the reconcile at <root>/authz/tuples.yaml). Grants
# only pointers, never material (§2.5). runner-on-View is the §2.5/ADR-0028 gate for
# launching Runs against a group.
tuples:
  - { user: principal:dev-runner, relation: runner, object: view:linux-fleet }
  - { user: principal:dev-runner, relation: runner, object: view:web-hosts }
  - { user: principal:dev-runner, relation: runner, object: view:secure-hosts }
  # Plugin-e2e target Views (dev-hosts = the seeded synthetic target; dev-vms =
  # the vcenter Syncer's projected vcsim VMs). The dev-runner launches the
  # actuator/syncer Runs against these — the runner-on-View gate at the door.
  - { user: principal:dev-runner, relation: runner, object: view:dev-hosts }
  - { user: principal:dev-runner, relation: runner, object: view:dev-vms }
  # dev-runner is the dev platform admin: it may approve the compute-build Gate
  # (ADR-0058 — the §5 Flow 1 build approval). In prod this is a real team.
  - { user: principal:dev-runner, relation: member, object: team:platform-admins }
  # …and may USE the aws-dev CredentialRef the build Action binds (§2.5 use-check).
  - { user: principal:dev-runner, relation: user, object: credential_ref:aws-dev }
  - { user: principal:dev-runner, relation: user, object: credential_ref:crossplane-dev }
  # …and the machine credential (SSH key) the web-server-configure remediation
  # rides to reach the managed-web node (ADR-0084 convergence fixture; §2.5 use-check).
  - { user: principal:dev-runner, relation: runner, object: view:managed-web }
  - { user: principal:dev-runner, relation: user, object: credential_ref:web-machine }
  # …and the helm/deploy Action's authz-gate CredentialRef (ADR-0092 M2 self-deploy):
  # dev-runner may launch the gated helm-deploy Workflow that materializes a release.
  - { user: principal:dev-runner, relation: user, object: credential_ref:helm-deploy }
