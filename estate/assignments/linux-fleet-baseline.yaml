# Binds the linux-baseline Intent to the linux-fleet group via fileset@1 — the
# "5-line simplest form" (ADR-0055): declare WHAT (the baseline) over WHICH group
# (linux-fleet) using WHICH template (the shared fileset@1 Blueprint). The compiler
# does the fan-out. Overrides, when needed, are explicit-overlay (guardrail 6),
# never a precedence field.
#
# It reuses the ONE fileset@1 Blueprint (not a duplicate "linux-baseline" one): a
# namespace has a single Blueprint owner (§2.1), and additive keys UNION within it —
# so this fleet's sshd-config key and web-files' nginx-conf key coexist in
# fileset.content without fighting. Blueprint reuse across fleets is the feature.
name: linux-fleet-baseline
intent: linux-baseline
view: linux-fleet
blueprint: fileset@1
environments: [dev]
