# Stratt CI — charter §1.7 (evergreen gate), §1.3 (DCO), §7.3 (supply chain).
#
# Pre-Phase-0 note: this repo stays private until §7.4 OSPO/IP clearance, so this
# workflow does not run yet — it is authored now so the gates exist the moment the
# repo lands on a (private) GitHub remote. It is CI config, not a public-facing OSS
# file (SECURITY.md / CONTRIBUTING stay withheld per §7.4).
#
# Supply-chain discipline (§7.3): every action is pinned to a commit digest, never a
# floating tag. Bump digests on the quarterly upgrade train alongside Taskfile floors.
# DCO is enforced inline (no third-party action) to keep the dependency surface boring.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Verify every commit is signed off
        run: |
          set -eu
          base='${{ github.event.pull_request.base.sha }}'
          head='${{ github.event.pull_request.head.sha }}'
          fail=0
          for c in $(git rev-list "$base".."$head"); do
            subject=$(git log -1 --format='%s' "$c")
            signoff=$(git log -1 --format='%(trailers:key=Signed-off-by,valueonly)' "$c" | tr -d '[:space:]')
            if [ -z "$signoff" ]; then
              echo "  ✗ $c missing Signed-off-by — $subject"; fail=1
            else
              echo "  ✓ $c"
            fi
          done
          if [ "$fail" != 0 ]; then
            echo 'DCO failed — sign commits with `git commit -s` (charter §1.3). No CLA.'
            exit 1
          fi

  build:
    name: Evergreen + lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: Install Task (pinned)
        run: |
          set -eu
          go install github.com/go-task/task/v3/cmd/task@v3.52.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Run CI gate
        run: task ci
