# Stratt task runner — charter §3 ("Task runner: `task`").
#
# Pre-Phase-0: there is no product code yet, so every language branch below is
# guarded on its manifest (go.mod / package.json / pyproject.toml) and no-ops
# cleanly until that code lands. The targets are the stable contract CI and the
# devcontainer call today; they grow bodies, not names, as the spine is built.
#
# The evergreen floors are the N-1 gate (charter §1.7). Bumping them is the
# "quarterly upgrade train" checklist item — edit the vars, not the logic.

version: "3"

vars:
  GO_MIN: "1.24" # N-1 of the Go 1.25 line
  NODE_MIN: "22" # previous LTS (container ships current LTS 24)
  PYTHON_MIN: "3.13" # N-1 of 3.14 (pods / plugin SDK only — charter §3)
  TASK_MIN: "3.0"
  # Sovereign plugin port codegen (ADR-0046 Phase A). Pinned like the other
  # `go run <tool>@<ver>` tools; bump on the quarterly upgrade train.
  BUF_VER: "1.71.0"
  PROTOC_GEN_GO_VER: "1.36.11" # tracks google.golang.org/protobuf (pinned UP by k8s.io — see core/go.mod)
  PROTOC_GEN_GO_GRPC_VER: "1.5.1"
  # Cluster tooling — pinned + installed to repo-local .bin/ so the dev stack
  # stands up with ZERO manual installs beyond go+task (quarterly upgrade train).
  KIND_VER: "0.32.0"
  # Helm 4 line (ADR-0092 / dependency-scout): Helm 3 bug-fix support lapsed
  # 2026-07-08 (security EOL 2026-11-11), so the pin moved off the stale 3.16.4.
  # N-1 v3.21.3 must keep working; the plugin image pins the same v4.2.3.
  # sha256 verified against get.helm.sh (§7.3 — verify, don't trust a bare curl).
  HELM_VER: "4.2.3"
  HELM_SHA256_AMD64: "e9b88b4ee95b18c706839c28d3a0220e5bc470e9cd9262410c90793c45ff8b7c"
  HELM_SHA256_ARM64: "21abd9354d39b2cd79a8d76be6912cd137a983cbf997193503fb8a6a6e2f2785"
  KUBECTL_VER: "1.34.1" # within skew of the kind node (K8s N-2, §1.7)
  BIN: "{{.ROOT_DIR}}/.bin"
  HELM: "{{.ROOT_DIR}}/.bin/helm"
  KUBECTL: "{{.ROOT_DIR}}/.bin/kubectl"
  KIND_CLUSTER: "stratt-dev"
  KIND_CONTEXT: "kind-stratt-dev"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:devcontainer:
    desc: Idempotent devcontainer bootstrap — verify toolchain, enforce evergreen
    silent: true
    cmds:
      - task: versions
      - task: evergreen

  setup:gh-auth:
    # Kept OUT of setup:devcontainer (which is host-reproducible + side-effect-free): this appends to
    # the shell rc files, so it is container-only and invoked explicitly from postCreateCommand.sh.
    desc: Container-only — let gh borrow the VSCode-forwarded git credential (no stored token)
    silent: true
    cmds:
      - bash {{.ROOT_DIR}}/.devcontainer/setup-gh-auth.sh

  versions:
    desc: Print installed toolchain versions
    silent: true
    cmds:
      - |
        echo "Stratt toolchain:"
        printf '  go      %s\n' "$(go version 2>/dev/null | awk '{print $3}' | sed 's/^go//' || echo MISSING)"
        printf '  node    %s\n' "$(node --version 2>/dev/null | sed 's/^v//' || echo MISSING)"
        printf '  python  %s\n' "$(python3 --version 2>/dev/null | awk '{print $2}' || echo MISSING)"
        printf '  uv      %s\n' "$(uv --version 2>/dev/null | awk '{print $2}' || echo MISSING)"
        printf '  task    %s\n' "$(task --version 2>/dev/null | sed 's/^v//' || echo MISSING)"

  evergreen:
    desc: Fail the build if any toolchain dep is below its N-1 floor (charter §1.7)
    silent: true
    cmds:
      - |
        set -eu
        fail=0
        check() {
          name="$1"; min="$2"; cur="$3"
          if [ -z "$cur" ]; then
            echo "  ✗ $name: not found (need >= $min)"; fail=1; return
          fi
          lowest=$(printf '%s\n%s\n' "$min" "$cur" | sort -V | head -n1)
          if [ "$lowest" = "$min" ]; then
            echo "  ✓ $name $cur (>= $min)"
          else
            echo "  ✗ $name $cur is below the N-1 floor $min"; fail=1
          fi
        }
        check go     "{{.GO_MIN}}"     "$(go version 2>/dev/null | awk '{print $3}' | sed 's/^go//')"
        check node   "{{.NODE_MIN}}"   "$(node --version 2>/dev/null | sed 's/^v//' | cut -d. -f1)"
        check python "{{.PYTHON_MIN}}" "$(python3 --version 2>/dev/null | awk '{print $2}')"
        check task   "{{.TASK_MIN}}"   "$(task --version 2>/dev/null | sed 's/^v//')"
        if [ "$fail" != 0 ]; then
          echo "Evergreen gate FAILED (charter §1.7 — stay >= N-1)."; exit 1
        fi
        echo "Evergreen gate passed."

  # Go modules live in the go.work workspace (ADR-0005), not at the repo
  # root; every Go branch below iterates the workspace members.
  fmt:
    desc: Format Go, web, and Python sources (skips languages with no files yet)
    silent: true
    cmds:
      - |
        set -eu
        if [ -f go.work ]; then
          files=$(git ls-files '*.go' | grep -v '\.gen\.go$' || true)
          [ -z "$files" ] || { echo '→ gofmt'; gofmt -w $files; }
        fi
        if [ -f package.json ]; then echo '→ prettier'; npx --yes prettier --write . >/dev/null; fi
        if [ -f pyproject.toml ]; then echo '→ ruff format'; uv run ruff format .; fi
        echo "fmt done."

  fmt:check:
    desc: Verify formatting without modifying files (CI gate)
    silent: true
    cmds:
      - |
        set -eu
        rc=0
        if [ -f go.work ]; then
          files=$(git ls-files '*.go' | grep -v '\.gen\.go$' || true)
          if [ -n "$files" ]; then
            out=$(gofmt -l $files); [ -z "$out" ] || { echo "gofmt needs: $out"; rc=1; }
          fi
        fi
        if [ -f package.json ]; then npx --yes prettier --check . || rc=1; fi
        if [ -f pyproject.toml ]; then uv run ruff format --check . || rc=1; fi
        if [ "$rc" != 0 ]; then exit 1; fi
        echo "fmt:check clean."

  lint:
    desc: Lint Go, web, and Python (skips languages with no files yet)
    silent: true
    cmds:
      - |
        set -eu
        if [ -f go.work ]; then
          for mod in $(go work edit -json | jq -r '.Use[].DiskPath'); do
            echo "→ go vet ($mod)"; (cd "$mod" && go vet ./...)
          done
        fi
        if [ -f package.json ]; then echo '→ eslint'; npx --yes eslint .; fi
        if [ -f pyproject.toml ]; then echo '→ ruff check'; uv run ruff check .; fi
        echo "lint done."

  test:
    desc: Run tests across all workspace modules
    silent: true
    cmds:
      - |
        set -eu
        ran=0
        if [ -f go.work ]; then
          for mod in $(go work edit -json | jq -r '.Use[].DiskPath'); do
            echo "→ go test ($mod)"; (cd "$mod" && go test ./...)
          done
          ran=1
        fi
        if [ -f pyproject.toml ]; then echo '→ pytest'; uv run pytest; ran=1; fi
        if [ "$ran" = 0 ]; then echo "No packages yet — nothing to test."; fi

  e2e:cells:
    desc: Two-Cell end-to-end harness — federated read + fenced Source re-home over real HTTP (ADR-0044; needs `task dev:up`)
    dir: core
    cmds:
      - go test ./internal/api/ -run TestCellsE2E -v -count=1

  ci:
    desc: Aggregate gate CI runs — evergreen + formatting + lint + codegen freshness + tests
    cmds:
      - task: evergreen
      - task: fmt:check
      - task: lint
      - task: generate:check
      - task: proto:check
      - task: migrate:lint
      - task: adr:index:check
      - task: test
      - task: ui:ci

  dev:up:
    desc: "EXTRAS (opt-in; genesis needs none of this): full compose dev substrate (Postgres 18, NATS, Temporal, vcsim, …)"
    cmds:
      - docker compose -f deploy/dev/docker-compose.yml up -d --wait

  dev:down:
    desc: Stop the dev substrate (keep volumes)
    cmds:
      - docker compose -f deploy/dev/docker-compose.yml down

  dev:nuke:
    desc: Stop the dev substrate and delete its volumes (fresh graph)
    prompt: This deletes the dev Postgres/NATS data volumes. Continue?
    cmds:
      - docker compose -f deploy/dev/docker-compose.yml down -v

  dev:zitadel:bootstrap:
    desc: Provision the dev e2e service identities in Zitadel (ADR-0009 slice 5)
    cmds:
      - deploy/dev/zitadel-bootstrap.sh

  migrate:lint:
    desc: >
      Expand/contract lint (UPG-1, ADR-0078): fail if a migration's Up section has
      a DESTRUCTIVE change (drop/rename/type-change/set-not-null) that would break
      the previous release's still-running replicas during a rolling upgrade. A
      genuine contract step (a later release, after every replica is new) opts out
      with a `-- expand/contract-ok: <reason>` marker in the file.
    cmds:
      - |
        set -eu
        dir=core/internal/graph/migrations
        rc=0
        for f in "$dir"/*.sql; do
          up=$(awk '/-- \+goose Up/{u=1;next} /-- \+goose Down/{u=0} u' "$f")
          if printf '%s\n' "$up" | grep -iqE 'DROP +TABLE|DROP +COLUMN|DROP +CONSTRAINT|RENAME +(COLUMN|TO)|ALTER +COLUMN.*TYPE|SET +NOT +NULL'; then
            if grep -qiE 'expand/contract-ok' "$f"; then
              echo "  ~ $(basename "$f"): destructive Up, acknowledged (expand/contract-ok)"
            else
              echo "  ✗ $(basename "$f"): destructive change in Up would break the previous release's replicas during a rolling upgrade (UPG-1). Split into a later contract release, or annotate '-- expand/contract-ok: <reason>'."
              rc=1
            fi
          fi
        done
        [ "$rc" = 0 ] && echo "✓ migrations are expand/contract-safe" || exit 1

  dr:restore-test:
    desc: >
      DR restore drill (enterprise-readiness DR-1): pg_dump the graph exactly as
      the backup CronJob does, restore it into a throwaway database, and assert a
      known table survives. Proves the backup FORMAT restores — a backup you have
      never restored is not a backup. Needs the dev substrate (task dev:up).
    vars:
      URL: '{{.STRATT_DATABASE_URL | default "postgres://stratt:stratt-dev@localhost:5432/stratt"}}'
    cmds:
      - |
        set -euo pipefail
        base="{{.URL}}"; base="${base%/*}"
        tmp="stratt_restore_test_$$"
        dump="$(mktemp -t stratt-dr-XXXX.sql.gz)"
        # The dump client major MUST be >= the server major (the backup CronJob's
        # postgres:18 image guarantees this in-cluster). pipefail makes a failed
        # pg_dump abort the drill rather than write an empty archive.
        echo "→ dump (as the CronJob does)"
        pg_dump "{{.URL}}" | gzip > "$dump" || { echo "pg_dump failed — ensure the client major >= server (the CronJob uses postgres:18)"; exit 1; }
        trap 'rm -f "$dump"; psql "$base/postgres" -c "DROP DATABASE IF EXISTS $tmp WITH (FORCE)" >/dev/null 2>&1 || true' EXIT
        echo "→ restore into $tmp"; createdb "$base/$tmp" >/dev/null 2>&1 || psql "$base/postgres" -c "CREATE DATABASE $tmp"
        gunzip -c "$dump" | psql "$base/$tmp" >/dev/null
        echo "→ verify the (non-rebuildable) audit chain table survived the roundtrip"
        n=$(psql "$base/$tmp" -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='audit' AND table_name='event'")
        test "$n" = "1" || { echo "RESTORE FAILED: audit.event missing after restore"; exit 1; }
        echo "✓ DR restore drill passed (dump→restore→verify)"

  dev:openbao:bootstrap:
    desc: Provision the dev CLM in OpenBao — PKI engine, root CA, role, demo certs (ADR-0030)
    cmds:
      - deploy/dev/openbao-bootstrap.sh

  dev:netbox:bootstrap:
    desc: Seed the dev NetBox with an enterprise topology — regions, AZs, tenants (sovereignty), VLANs, the app supernet (ADR-0111)
    cmds:
      - deploy/dev/netbox-bootstrap.sh

  dev:vsphere:bootstrap:
    desc: Seed the dev vcsim with an enterprise topology — regions (datacenters), AZs (clusters), sovereignty (tenant folders), VLAN portgroups (ADR-0113)
    dir: plugins/vcenter
    cmds:
      - STRATT_VCENTER_URL={{.STRATT_VCENTER_URL | default "https://localhost:8989/sdk"}} go run ./cmd/vsphere-seed

  dev:scim:bootstrap:
    desc: Drive the SCIM SP like an IdP — push Users/Group, filter, deactivate (ADR-0035)
    cmds:
      - deploy/dev/scim-bootstrap.sh

  dev:logs:
    desc: Tail dev substrate logs
    cmds:
      - docker compose -f deploy/dev/docker-compose.yml logs -f --tail=50

  dev:kind:up:
    desc: Create the kind dev cluster for the dispatcher (ADR-0007) — idempotent, self-healing
    deps: [tools:kubectl]
    cmds:
      # Pre-create kind's network with an explicit subnet — the devcontainer's
      # docker-in-docker default address pool is small, and kind reuses an
      # existing network named "kind" instead of allocating from the pool.
      - docker network inspect kind >/dev/null 2>&1 || docker network create --subnet 192.168.102.0/24 kind
      # Idempotent: only create when the cluster is absent (re-running the turnkey
      # stack must never fail on an existing cluster).
      - |
        if go run sigs.k8s.io/kind@v{{.KIND_VER}} get clusters 2>/dev/null | grep -qx {{.KIND_CLUSTER}}; then
          echo "kind cluster {{.KIND_CLUSTER}} already exists — skipping create"
        else
          go run sigs.k8s.io/kind@v{{.KIND_VER}} create cluster --config deploy/dev/kind.yaml
        fi
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} export kubeconfig --name {{.KIND_CLUSTER}}
      # Raise the host inotify limit FROM the privileged kind node (we can't sudo
      # in the devcontainer, and this sysctl is host-global). The devcontainer
      # default (128 instances) is too low for kube-proxy + CoreDNS, which crash
      # with "too many open files" and take ClusterIP routing + DNS down with them.
      # A real host/CI runner already has an adequate limit; this makes the
      # constrained dev host self-sufficient. Idempotent.
      - docker exec {{.KIND_CLUSTER}}-control-plane sysctl -w fs.inotify.max_user_instances=1024 fs.inotify.max_user_watches=1048576 >/dev/null
      # If kube-proxy/CoreDNS already crashed under the old limit, bounce them so
      # they restart under the raised one; then wait for the rollout (which handles
      # the pod-recreation window, unlike `wait` which errors on no-match). DNS +
      # ClusterIP must be healthy before strattd dispatch / plugin dials depend on them.
      - |
        set -eu
        ready=$({{.KUBECTL}} --context {{.KIND_CONTEXT}} -n kube-system get pods -l k8s-app=kube-proxy -o jsonpath='{.items[*].status.containerStatuses[*].ready}' 2>/dev/null || true)
        if ! echo "$ready" | grep -q true; then
          {{.KUBECTL}} --context {{.KIND_CONTEXT}} -n kube-system rollout restart ds/kube-proxy deploy/coredns
        fi
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n kube-system rollout status ds/kube-proxy --timeout=150s"
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n kube-system rollout status deploy/coredns --timeout=150s"

  dev:kind:down:
    desc: Delete the kind dev cluster
    cmds:
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} delete cluster --name {{.KIND_CLUSTER}}

  dev:status:
    desc: "Show the dev environment at a glance — kind cluster, strattd + plugin pods (with age; the ADR-0103 no-restart signal), and the compose substrate"
    silent: true
    deps: [tools:kubectl]
    cmds:
      - |
        set -eu
        echo "── kind cluster ─────────────────────────────────"
        if go run sigs.k8s.io/kind@v{{.KIND_VER}} get clusters 2>/dev/null | grep -qx {{.KIND_CLUSTER}}; then
          echo "  ✓ {{.KIND_CLUSTER}} up  (context {{.KIND_CONTEXT}})"
          echo
          echo "── workloads: namespace stratt ──────────────────"
          if {{.KUBECTL}} --context {{.KIND_CONTEXT}} get ns stratt >/dev/null 2>&1; then
            # AGE is the no-restart proof (ADR-0103): a runtime Connector enable/disable
            # must NOT bump the strattd pod's age.
            {{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt get pods 2>/dev/null
          else
            echo "  (no 'stratt' namespace — not installed; run: task dev:genesis)"
          fi
        else
          echo "  ✗ {{.KIND_CLUSTER}} not found  (run: task dev:genesis)"
        fi
        echo
        echo "── compose substrate ────────────────────────────"
        docker compose -f deploy/dev/docker-compose.yml ps 2>/dev/null || echo "  (compose not running)"

  image:build:
    desc: Build the strattd control-plane image (ADR-0013)
    cmds:
      - docker build -f deploy/docker/strattd.Dockerfile -t stratt/strattd:dev .

  image:kind-load:
    desc: Build the strattd image and load it into the dev kind cluster
    cmds:
      - task: image:build
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt/strattd:dev --name {{.KIND_CLUSTER}}

  image:agent:
    desc: Build the stratt-agent (Site satellite) image and load it into kind (ADR-0032)
    cmds:
      - docker build -f deploy/docker/stratt-agent.Dockerfile -t stratt/stratt-agent:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt/stratt-agent:dev --name {{.KIND_CLUSTER}}

  image:forwarder:
    desc: Build the stratt-forwarder (audit→SIEM) image and load it into kind (ADR-0034)
    cmds:
      - docker build -f deploy/docker/stratt-forwarder.Dockerfile -t stratt/stratt-forwarder:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt/stratt-forwarder:dev --name {{.KIND_CLUSTER}}

  dev:forwarder:demo:
    desc: >-
      Run stratt-forwarder locally against the harness strattd, shipping the audit
      stream to a declared SIEM sink (ADR-0034). Declare a sink under
      notify-sinks/ (kind splunk-hec|syslog|otel-logs, config.endpoint) + grant
      the forwarder principal reader on audit:log, then `stratt apply`. Set
      STRATT_FORWARDER_SINK to the sink name.
    cmds:
      - |
        go run -C core ./cmd/stratt-forwarder
    env:
      STRATT_SERVER: '{{.STRATT_SERVER | default "http://localhost:8080"}}'
      STRATT_FORWARDER_SINK: '{{.SINK | default "splunk-dev"}}'
      STRATT_FORWARDER_PRINCIPAL: '{{.PRINCIPAL | default "audit-forwarder"}}'
      STRATT_FORWARDER_CRED_DIR: '{{.CRED_DIR | default ""}}'

  dev:site:up:
    desc: Bring up the remote Site "edge-west" agent in kind namespace site-b (ADR-0032)
    cmds:
      - task: image:agent
      - kubectl apply -f deploy/dev/site-agent.yaml
      # A Site-LOCAL credential Secret — material lives at the Site, never shipped
      # over NATS (§2.5). Only created if absent (idempotent).
      - kubectl -n site-b create secret generic edge-demo-cred --from-literal=token=site-local-only --dry-run=client -o yaml | kubectl apply -f -
      - kubectl -n site-b rollout status deploy/stratt-agent --timeout=90s

  dev:site:down:
    desc: Tear down the edge-west Site agent + namespace
    cmds:
      - kubectl delete -f deploy/dev/site-agent.yaml --ignore-not-found

  dev:cosign:keys:
    desc: Generate a dev cosign key pair for Bundle signing (ADR-0032; empty password)
    dir: deploy/dev
    cmds:
      - test -f cosign.key || COSIGN_PASSWORD="" cosign generate-key-pair
    status:
      - test -f deploy/dev/cosign.key

  dev:bundle:demo:
    desc: Build+push+sign a demo Bundle to the dev registry (ADR-0032). Prints the digest to pin.
    dir: deploy/dev
    vars:
      REF: localhost:5555/stratt/bundles/hello:1
    cmds:
      - task: dev:cosign:keys
      - rm -rf /tmp/stratt-bundle && mkdir -p /tmp/stratt-bundle/project
      - printf 'echo "hello from a signed pull Bundle"\n' > /tmp/stratt-bundle/project/run.sh
      # Build+push via the CLI; the manifest digest it prints is what you pin + sign.
      - STRATT_BUNDLE_INSECURE=true go run -C ../../core ./cmd/stratt bundle push /tmp/stratt-bundle {{.REF}} --name hello --version 1 --actuator script --command "sh,/runner/project/run.sh"
      - COSIGN_PASSWORD="" cosign sign --yes --allow-insecure-registry --key cosign.key {{.REF}}

  chart:lint:
    desc: Lint + render the Helm chart (ADR-0013)
    deps: [tools:helm, dev:stage-estate]
    cmds:
      - "{{.HELM}} lint deploy/charts/stratt"
      - "{{.HELM}} template stratt deploy/charts/stratt > /dev/null"
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-dev-kind.yaml > /dev/null"
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-dev-kind.yaml -f deploy/charts/stratt/values-e2e.yaml > /dev/null"
      # Real-authz profile (ADR-0101 Phase A): openfga.enabled + oidc.issuers, dev header off.
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-dev-kind.yaml -f deploy/charts/stratt/values-e2e.yaml -f deploy/charts/stratt/values-authz.yaml > /dev/null"
      # Self-contained bootstrap profile (in-cluster substrate) — must render too.
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-allinone.yaml > /dev/null"
      # Self-deploy profile (helm Actuator plugin + demo chart, M2/ADR-0092).
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-allinone.yaml -f deploy/charts/stratt/values-selfdeploy.yaml > /dev/null"
      # Genesis profile (ADR-0102): minimal floor + self-deploy + inline declarations.
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-allinone.yaml -f deploy/charts/stratt/values-selfdeploy.yaml -f deploy/charts/stratt/values-genesis.yaml > /dev/null"
      # Connector-e2e profile (ADR-0103): fully in-kind — allinone substrate + helm/declared plugins + estate.
      - "{{.HELM}} template stratt deploy/charts/stratt -f deploy/charts/stratt/values-allinone.yaml -f deploy/charts/stratt/values-connector-e2e.yaml > /dev/null"

  tools:helm:
    desc: Install the pinned helm binary to .bin/ (idempotent; zero-manual bootstrap)
    status:
      - test "$({{.HELM}} version --short 2>/dev/null | sed 's/^v//; s/+.*//')" = "{{.HELM_VER}}"
    cmds:
      - mkdir -p {{.BIN}}
      - |
        set -eu
        arch=$(uname -m); case "$arch" in x86_64) arch=amd64;; aarch64|arm64) arch=arm64;; esac
        # Verify the pinned sha256 before install (§7.3 — no bare `curl | tar`;
        # dependency-scout binding condition, ADR-0092).
        case "$arch" in
          amd64) sha="{{.HELM_SHA256_AMD64}}";;
          arm64) sha="{{.HELM_SHA256_ARM64}}";;
          *) echo "unsupported arch: $arch" >&2; exit 1;;
        esac
        tmp=$(mktemp -d)
        curl -fsSL -o "$tmp/helm.tgz" "https://get.helm.sh/helm-v{{.HELM_VER}}-linux-${arch}.tar.gz"
        echo "${sha}  $tmp/helm.tgz" | sha256sum -c -
        tar -xz -C "$tmp" -f "$tmp/helm.tgz"
        install -m 0755 "$tmp/linux-${arch}/helm" "{{.HELM}}"
        rm -rf "$tmp"

  tools:kubectl:
    desc: Install the pinned kubectl binary to .bin/ (idempotent; zero-manual bootstrap)
    status:
      - "{{.KUBECTL}} version --client 2>/dev/null | grep -q 'v{{.KUBECTL_VER}}'"
    cmds:
      - mkdir -p {{.BIN}}
      - |
        set -eu
        arch=$(uname -m); case "$arch" in x86_64) arch=amd64;; aarch64|arm64) arch=arm64;; esac
        curl -fsSL -o "{{.KUBECTL}}" "https://dl.k8s.io/release/v{{.KUBECTL_VER}}/bin/linux/${arch}/kubectl"
        chmod +x "{{.KUBECTL}}"

  dev:kind:gateway:
    desc: Print the kind docker network's host gateway (compose substrate locus)
    silent: true
    cmds:
      - |
        gw=$(docker network inspect kind 2>/dev/null | grep -m1 '"Gateway"' | sed 's/.*: *"//; s/".*//')
        echo "${gw:-192.168.102.1}"

  image:vcenter-plugin:
    desc: Build the vcenter gRPC Syncer plugin image and load it into the kind cluster
    cmds:
      - docker build -f plugins/vcenter/Dockerfile -t stratt-plugin-vcenter:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-vcenter:dev --name {{.KIND_CLUSTER}}

  image:declared-plugin:
    desc: Build the declared-estate gRPC Syncer plugin image and load it into the kind cluster
    cmds:
      - docker build -f plugins/declared/Dockerfile -t stratt-plugin-declared:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-declared:dev --name {{.KIND_CLUSTER}}

  image:awsec2-plugin:
    desc: Build the awsec2 gRPC plugin image (create-vm build Action) and load it into the kind cluster
    cmds:
      - docker build -f plugins/awsec2/Dockerfile -t stratt-plugin-awsec2:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-awsec2:dev --name {{.KIND_CLUSTER}}

  image:netbox-plugin:
    desc: Build the NetBox topology Syncer plugin image (ADR-0059) and load it into the kind cluster
    cmds:
      - docker build -f plugins/netbox/Dockerfile -t stratt-plugin-netbox:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-netbox:dev --name {{.KIND_CLUSTER}}

  image:helm-plugin:
    desc: Build the helm Actuator plugin image and load it into the kind cluster (ADR-0092)
    cmds:
      - docker build -f plugins/helm/Dockerfile -t stratt-plugin-helm:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-helm:dev --name {{.KIND_CLUSTER}}

  image:crossplane-plugin:
    desc: Build the Crossplane build-Actuator plugin image (ADR-0059) and load it into the kind cluster
    cmds:
      - docker build -f plugins/crossplane/Dockerfile -t stratt-plugin-crossplane:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-plugin-crossplane:dev --name {{.KIND_CLUSTER}}

  images:control-plane:
    desc: Build the CONTROL-PLANE images (no push/load) — the CI regression gate. Plugins & the EE image build in their OWN units (each plugin is its own build/CI unit, ADR-0046) — core CI never builds per-plugin (it must scale to hundreds of plugins).
    cmds:
      - docker build -f deploy/docker/strattd.Dockerfile -t stratt/strattd:ci .
      - docker build -f deploy/docker/stratt-agent.Dockerfile -t stratt/stratt-agent:ci .
      - docker build -f deploy/docker/stratt-forwarder.Dockerfile -t stratt/stratt-forwarder:ci .

  dev:stage-estate:
    desc: Stage the reconciled /estate into the chart's inline-declarations path (Helm can't glob outside the chart)
    cmds:
      # /estate is the single source of truth; this git-ignored copy is what the
      # inline-declarations ConfigMap globs. Mirror exactly (delete-extraneous) so
      # a removed declaration doesn't linger in the staged tree.
      - rm -rf {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations
      - mkdir -p {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations
      - cp -R {{.ROOT_DIR}}/estate/. {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations/

  dev:stage-genesis:
    # The LEAN genesis slice (ADR-0102): stage ONLY deploy/dev/genesis-estate into the
    # inline-declarations path — the one bootstrap-admin grant + the genesis self-deploy
    # Workflow/CredentialRef, NOT the full /estate. Same mirror-exactly mechanism as
    # dev:stage-estate, different (minimal) source, so genesis boots with just its floor.
    desc: Stage the lean genesis slice (bootstrap-admin grant + self-deploy Workflow) into the inline-declarations path
    cmds:
      - rm -rf {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations
      - mkdir -p {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations
      - cp -R {{.ROOT_DIR}}/deploy/dev/genesis-estate/. {{.ROOT_DIR}}/deploy/charts/stratt/dev/declarations/

  dev:managed-web:up:
    desc: Deploy the REAL sshd/nginx managed node for the ADR-0084 convergence demo (keypair + machine-credential Secret + node, idempotent)
    deps: [tools:kubectl]
    vars:
      KEYDIR: "{{.ROOT_DIR}}/deploy/dev/managed-web"
    cmds:
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} export kubeconfig --name {{.KIND_CLUSTER}}
      # A throwaway ed25519 keypair (idempotent): the PRIVATE half rides the
      # web-machine CredentialRef (Secret web-machine-creds); the PUBLIC half is the
      # node's authorized_keys. Material is git-ignored, never committed (§2.5).
      - mkdir -p {{.KEYDIR}}
      - test -f {{.KEYDIR}}/id_ed25519 || ssh-keygen -t ed25519 -N "" -C stratt-web-machine -f {{.KEYDIR}}/id_ed25519
      # The machine credential the remediation Step use-checks + mounts (§2.5).
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt create secret generic web-machine-creds --from-file=ssh-privatekey={{.KEYDIR}}/id_ed25519 --dry-run=client -o yaml | {{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f -"
      # The node's authorized_keys (the public half).
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt create secret generic managed-web-authorized-keys --from-file=authorized_keys={{.KEYDIR}}/id_ed25519.pub --dry-run=client -o yaml | {{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f -"
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f {{.ROOT_DIR}}/deploy/dev/managed-web.yaml"
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt rollout status deploy/managed-web --timeout=120s"

  dev:crossplane:
    desc: Install REAL Crossplane + provider-kubernetes into kind for the topology build loop (ADR-0059, idempotent)
    deps: [tools:helm, tools:kubectl]
    cmds:
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} export kubeconfig --name {{.KIND_CLUSTER}}
      - "{{.HELM}} repo add crossplane-stable https://charts.crossplane.io/stable --force-update"
      - "{{.HELM}} repo update crossplane-stable"
      - >-
        {{.HELM}} --kube-context {{.KIND_CONTEXT}} upgrade --install crossplane
        crossplane-stable/crossplane -n crossplane-system --create-namespace
        --version 2.3.3 --wait --timeout 5m
      # provider-kubernetes with a PINNED runtime SA (so RBAC can target it).
      - |
        cat <<'EOF' | {{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f -
        apiVersion: pkg.crossplane.io/v1beta1
        kind: DeploymentRuntimeConfig
        metadata: { name: provider-kubernetes }
        spec:
          serviceAccountTemplate:
            metadata: { name: provider-kubernetes }
        ---
        apiVersion: pkg.crossplane.io/v1
        kind: Provider
        metadata: { name: provider-kubernetes }
        spec:
          package: xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.17.0
          runtimeConfigRef: { name: provider-kubernetes }
        EOF
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} wait --for=condition=Healthy provider/provider-kubernetes --timeout=180s"
      # The subnet platform: ProviderConfig (InjectedIdentity) + confined provider RBAC.
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f {{.ROOT_DIR}}/deploy/dev/crossplane-subnet.yaml"

  dev:install:
    desc: "EXTRAS (advanced): helm-install strattd + all in-cluster plugins into kind, wired to the compose substrate (the plugin-e2e path; genesis uses dev:genesis instead)"
    deps: [tools:helm, tools:kubectl, dev:stage-estate]
    vars:
      GW:
        sh: |
          docker network inspect kind 2>/dev/null | grep -m1 '"Gateway"' | sed 's/.*: *"//; s/".*//'
    cmds:
      # Ensure the kubeconfig context exists (idempotent) before helm/kubectl.
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} export kubeconfig --name {{.KIND_CLUSTER}}
      - |
        set -eu
        GW="{{.GW}}"; GW="${GW:-192.168.102.1}"
        "{{.HELM}}" upgrade --install stratt {{.ROOT_DIR}}/deploy/charts/stratt \
          --kube-context {{.KIND_CONTEXT}} -n stratt --create-namespace \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-dev-kind.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-e2e.yaml \
          --set-string database.url="postgres://stratt:stratt-dev@${GW}:5432/stratt" \
          --set-string nats.url="nats://${GW}:4222" \
          --set-string temporal.address="${GW}:7233" \
          --set-string "plugins[1].env.STRATT_VCENTER_URL=https://${GW}:8989/sdk" \
          --set-string "plugins[1].hostEnv.STRATT_VCENTER_URL=https://${GW}:8989/sdk" \
          --set-string "plugins[2].env.STRATT_AWSEC2_ENDPOINT=http://${GW}:4566"
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt rollout status deploy/stratt --timeout=180s"

  dev:genesis:
    # THE default dev entrypoint (ADR-0102): nothing -> minimal Stratt in kind. kind +
    # the in-cluster spine (Postgres/NATS/Temporal, charter §1.4) + strattd + the in-proc
    # authz evaluator + ONE self-retiring dev-header bootstrap-admin Principal (granted
    # only enough to drive self-deploy — see deploy/dev/genesis-estate). No compose, no
    # tool plugins. From here Stratt self-deploys the rest through its OWN gated helm/deploy
    # loop (dev:genesis:selfdeploy). The self-retiring floor: the boot guard forbids the
    # dev header alongside OIDC, so it cannot persist into the real-authz posture. DEV ONLY.
    desc: THE default dev entrypoint — nothing -> minimal Stratt in kind (spine + strattd + bootstrap-admin), which then self-deploys the rest
    deps: [tools:helm, tools:kubectl]
    cmds:
      - task: dev:kind:up
      - task: image:kind-load
      - task: image:helm-plugin # the self-deploy Actuator Stratt uses to deploy the rest
      - task: dev:stage-genesis
      - |
        set -eu
        "{{.HELM}}" upgrade --install stratt {{.ROOT_DIR}}/deploy/charts/stratt \
          --kube-context {{.KIND_CONTEXT}} -n stratt --create-namespace \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-allinone.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-selfdeploy.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-genesis.yaml
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt rollout status deploy/stratt --timeout=240s"

  bootstrap:kind:
    desc: "Alias of dev:genesis (ADR-0102 renamed the minimal-core entrypoint)"
    cmds:
      - task: dev:genesis

  dev:genesis:selfdeploy:
    # Dogfood (ADR-0102): from the genesis floor, have Stratt self-deploy a REAL service —
    # the OpenFGA server (memory mode) — through its own gated helm/deploy loop. Ensures
    # the target namespace exists (the self-deploy plugin's ClusterRole is scoped to
    # workloads, NOT namespace-create — least authority), then launches the
    # genesis-authz-deploy Workflow, approves the platform-admins Gate as bootstrap-admin,
    # and waits for the WorkflowRun to converge. Run AFTER `task dev:genesis`.
    desc: "Dogfood: Stratt self-deploys the real OpenFGA server via its own gated helm/deploy loop"
    deps: [tools:kubectl]
    cmds:
      # The stratt-authz namespace is created by the chart (deployNamespace); here we just
      # seed the gate-marker Secret the gateOnly CredentialRef points at (pointer, no material).
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt-authz create secret generic helm-deploy-authz --from-literal=marker=1 --dry-run=client -o yaml | {{.KUBECTL}} --context {{.KIND_CONTEXT}} apply -f -"
      - KUBECONTEXT={{.KIND_CONTEXT}} KUBECTL={{.KUBECTL}} bash {{.ROOT_DIR}}/deploy/dev/genesis-selfdeploy.sh

  dev:promote:authz:
    # Genesis -> real-authz promotion, BACKEND axis (ADR-0102, docs/runbooks/genesis-to-authz.md):
    # point strattd's authz backend at the self-deployed OpenFGA server (in-proc -> server).
    # ONE strattd restart (backend selection is boot-time env); on boot SyncTuples pushes the
    # CaC tuples into the fresh server. Dev-header identity is RETAINED (legal — the boot guard
    # forbids only dev-header + OIDC). Run AFTER dev:genesis:selfdeploy. The full OIDC identity
    # flip (dev-header -> OpenBao) is the ADR-0101 follow-up.
    desc: "Promote authz backend in-proc -> the self-deployed OpenFGA server (one strattd restart)"
    deps: [tools:helm, tools:kubectl]
    cmds:
      - |
        set -eu
        "{{.HELM}}" upgrade --install stratt {{.ROOT_DIR}}/deploy/charts/stratt \
          --kube-context {{.KIND_CONTEXT}} -n stratt \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-allinone.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-selfdeploy.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-genesis.yaml \
          --set-string externalOpenfga.url=http://openfga.stratt-authz.svc:8080
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt rollout status deploy/stratt --timeout=240s"

  dev:connector-e2e:
    # ADR-0103 S7: the FULLY IN-KIND runtime-registry proof — NO compose. kind + the
    # in-cluster substrate (values-allinone) + the helm Actuator + declared Syncer plugin
    # pods + the full estate; the runtime Connector/Actuator registry dials + registers them
    # from estate/{actuators/helm,connectors/declared}.yaml with no strattd restart. From
    # here: edit a Connector declaration and watch the registry enable/disable it live
    # (GET /connectors, GET /actuators) while the strattd pod's start time never changes.
    desc: "ADR-0103: fully in-kind runtime-registry proof (no compose) — substrate + helm/declared plugins + estate"
    deps: [tools:helm, tools:kubectl]
    cmds:
      - task: dev:kind:up
      - task: image:kind-load # strattd
      - task: image:helm-plugin
      - task: image:declared-plugin
      - task: dev:stage-estate # full estate incl. connectors/actuators
      - |
        set -eu
        "{{.HELM}}" upgrade --install stratt {{.ROOT_DIR}}/deploy/charts/stratt \
          --kube-context {{.KIND_CONTEXT}} -n stratt --create-namespace \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-allinone.yaml \
          -f {{.ROOT_DIR}}/deploy/charts/stratt/values-connector-e2e.yaml
      - "{{.KUBECTL}} --context {{.KIND_CONTEXT}} -n stratt rollout status deploy/stratt --timeout=240s"

  dev:stack:up:
    desc: "EXTRAS (turnkey plugin-e2e stack): compose substrate + kind + all plugin images + helm-install (opt-in; genesis is the minimal default)"
    deps: [dev:kind:up]
    cmds:
      # Only the substrate the plugin e2e actually needs — Postgres (graph),
      # NATS (bus), Temporal (orchestration), vcsim (the vcenter Syncer's SoR).
      # Scoping this away from the full `dev:up` keeps the turnkey path off the
      # kitchen-sink extras (zot registry, zitadel, …) a plugin run never touches.
      - docker compose -f deploy/dev/docker-compose.yml up -d --wait postgres nats temporal vcsim floci openbao
      - task: image:kind-load
      - task: dev:ee:build
      - task: image:vcenter-plugin
      - task: image:declared-plugin
      - task: image:awsec2-plugin
      - task: dev:install

  dev:stack:down:
    desc: Uninstall the stack release and stop the substrate (keep volumes)
    cmds:
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} export kubeconfig --name {{.KIND_CLUSTER}} 2>/dev/null || true
      - "{{.HELM}} uninstall stratt --kube-context {{.KIND_CONTEXT}} -n stratt 2>/dev/null || true"
      - task: dev:down

  dev:stack:nuke:
    desc: Full teardown — uninstall, delete the kind cluster, and drop substrate volumes
    cmds:
      - task: dev:stack:down
      - task: dev:kind:down
      - task: dev:nuke

  e2e:seed:
    desc: Seed one synthetic dev-host Entity for the actuator e2e (Normalizer seam, §1.2)
    dir: core
    env:
      STRATT_DATABASE_URL: '{{.STRATT_DATABASE_URL | default "postgres://stratt:stratt-dev@localhost:5432/stratt"}}'
    cmds:
      - go run ./cmd/stratt-dev-seed

  e2e:plugin:actuator:
    desc: Prove the script+ansible EE-Job Actuators run as governed K8s Jobs in kind (needs dev:stack:up)
    dir: core
    cmds:
      - task: e2e:seed
      - go run ./cmd/stratt-dev-assert -mode=actuator -context={{.KIND_CONTEXT}}

  e2e:plugin:syncer:
    desc: Prove the vcenter gRPC Syncer plugin projects vcsim Entities + actuator on real targets (needs dev:stack:up)
    dir: core
    cmds:
      - go run ./cmd/stratt-dev-assert -mode=syncer -context={{.KIND_CONTEXT}}

  e2e:plugin:devices:
    desc: Prove devices-as-code — estate/hosts/*.yaml projects into the linux-fleet View via the declared-estate plugin (needs dev:stack:up)
    dir: core
    cmds:
      - go run ./cmd/stratt-dev-assert -mode=devices -context={{.KIND_CONTEXT}}

  e2e:plugin:
    desc: Full functional plugin e2e in kind — actuator (EE-Job) + syncer (gRPC) + devices-as-code (static-inv). Run after `task dev:stack:up`.
    cmds:
      - task: e2e:plugin:actuator
      - task: e2e:plugin:syncer
      - task: e2e:plugin:devices

  dev:ee:build:
    desc: Build the dev EE image and load it into the kind cluster
    cmds:
      # Context is the repo root: the multi-stage build compiles the stratt-ansible
      # shim (ADR-0051) from plugins/ansible + sdk before baking the EE runtime.
      - docker build -f ee/Dockerfile -t stratt-ee:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-ee:dev --name {{.KIND_CLUSTER}}

  dev:ee-mcp:build:
    desc: Build the MCP EE image and load it into the kind cluster (ADR-0022)
    cmds:
      # Context is the repo root: the multi-stage build compiles the stratt-mcp shim
      # (ADR-0053) from plugins/mcp + sdk before baking the sandbox runtime.
      - docker build -f ee/mcp.Dockerfile -t stratt-ee-mcp:dev .
      - go run sigs.k8s.io/kind@v{{.KIND_VER}} load docker-image stratt-ee-mcp:dev --name {{.KIND_CLUSTER}}

  generate:
    desc: Regenerate code from specs (OpenAPI → server stubs + UI types, ADR-0006/0012; proto → plugin port, ADR-0046)
    cmds:
      - cd core && go generate ./...
      - cd ui && npm run generate
      - task: proto:generate

  generate:check:
    desc: Fail if generated code is stale relative to the spec (CI gate, ADR-0006)
    cmds:
      - task: generate
      - git diff --exit-code -- '**/*.gen.go' 'ui/src/api/schema.d.ts'

  adr:index:
    desc: Regenerate the ADR knowledge-graph map (docs/adr/MAP.md) from topics.json (ADR-0109)
    cmds:
      - go run ./tools/adrmap

  adr:index:check:
    desc: Fail if the ADR map is stale or an ADR is untagged (CI gate, ADR-0109)
    cmds:
      - go run ./tools/adrmap -check

  proto:generate:
    desc: Regenerate Go bindings from the sovereign plugin port proto (ADR-0046 Phase A)
    dir: proto
    cmds:
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@v{{.PROTOC_GEN_GO_VER}}
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v{{.PROTOC_GEN_GO_GRPC_VER}}
      - PATH="$(go env GOPATH)/bin:$PATH" go run github.com/bufbuild/buf/cmd/buf@v{{.BUF_VER}} generate

  proto:check:
    desc: Lint + no-breaking-change gate for the plugin port; fail if bindings are stale (ADR-0046 inv#5)
    cmds:
      - cd proto && go run github.com/bufbuild/buf/cmd/buf@v{{.BUF_VER}} lint
      - cd proto && go run github.com/bufbuild/buf/cmd/buf@v{{.BUF_VER}} build
      - task: proto:breaking
      - task: proto:generate
      - git diff --exit-code -- sdk

  proto:breaking:
    desc: Enforce additive-only evolution of the plugin port vs main (ADR-0046 inv#5 / §1.7 anti-fossilization)
    dir: proto
    silent: true
    cmds:
      - |
        set -eu
        out=$(go run github.com/bufbuild/buf/cmd/buf@v{{.BUF_VER}} breaking --against '../.git#branch=main,subdir=proto' 2>&1) || {
          printf '%s\n' "$out" | grep -q 'no .proto files' && { echo "✓ proto:breaking — no baseline on main yet (first introduction of the port); gate engages once merged"; exit 0; }
          printf '%s\n' "$out"; exit 1
        }
        echo "✓ proto:breaking — no breaking changes vs main"

  ui:dev:
    desc: Vite dev server on :5173, /api proxied to strattd :8080 (ADR-0012)
    dir: ui
    cmds:
      - npm run dev

  ui:build:
    desc: Build the UI (serve via STRATT_UI_DIR=ui/dist)
    dir: ui
    cmds:
      - npm run build

  ui:lint:
    desc: ESLint the UI (0 warnings; ADR-0090)
    dir: ui
    cmds:
      - npm run lint

  ui:typecheck:
    desc: Type-check the UI (tsc, ADR-0090)
    dir: ui
    cmds:
      - npm run typecheck

  ui:test:
    desc: Run the UI unit tests (vitest, ADR-0090)
    dir: ui
    cmds:
      - npm run test

  ui:ci:
    desc: UI gate — typecheck + lint + tests + build (ADR-0090). Runs in the aggregate `ci`.
    cmds:
      - task: ui:typecheck
      - task: ui:lint
      - task: ui:test
      - task: ui:build
